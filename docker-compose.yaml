services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    networks:
      - skyfollower

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - skyfollower

  # ---------------------------------------------------------------------------
  # Core pipeline
  # ---------------------------------------------------------------------------

  receiver:
    image: ghcr.io/brentio/skyfollower-receiver:latest
    restart: unless-stopped
    volumes:
      - ./config/receiver/settings.json:/app/settings.json:ro
      - receiver-queue:/app/data
    depends_on:
      - rabbitmq
    networks:
      - skyfollower

  processor-0:
    image: ghcr.io/brentio/skyfollower-processor:latest
    restart: unless-stopped
    volumes:
      - ./config/processor/settings.json:/app/settings.json:ro
      - processor-0-archive:/app/data
    environment:
      PROCESSOR_ID: "0"
    depends_on:
      - rabbitmq
      - redis
    networks:
      - skyfollower

  # To add a second processor:
  #   1. Uncomment the block below and add a processor-1-archive volume entry.
  #   2. Set PROCESSOR_COUNT=2 in .env.
  #   3. Restart the receiver so it begins routing to both queues.
  #
  # processor-1:
  #   image: ghcr.io/brentio/skyfollower-processor:latest
  #   restart: unless-stopped
  #   volumes:
  #     - ./config/processor/settings.json:/app/settings.json:ro
  #     - processor-1-archive:/app/data
  #   environment:
  #     PROCESSOR_ID: "1"
  #   depends_on:
  #     - rabbitmq
  #     - redis
  #   networks:
  #     - skyfollower

  archive-processor:
    image: ghcr.io/brentio/skyfollower-archive:latest
    restart: unless-stopped
    volumes:
      - ./config/archive/settings.json:/app/settings.json:ro
      - archive-data:/app/data
    depends_on:
      - rabbitmq
      - redis
    networks:
      - skyfollower

  ui:
    image: ghcr.io/brentio/skyfollower-ui:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./config/ui/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

  # ---------------------------------------------------------------------------
  # Scheduler — triggers data runners on cron schedule
  # ---------------------------------------------------------------------------

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/ofelia/config.ini:/etc/ofelia/config.ini:ro
    depends_on:
      - runner-standing-data
      - runner-mictronics
      - runner-ourairports
      - runner-us-faa
      - runner-ca-transport-canada
      - runner-flightaware
    networks:
      - skyfollower

  # ---------------------------------------------------------------------------
  # Data runners — created stopped; started on schedule by ofelia.
  #
  # To initialise before first scheduled run:
  #   docker compose --profile runners up --no-start
  # To run a runner manually:
  #   docker compose run --rm runner-ourairports
  # ---------------------------------------------------------------------------

  runner-standing-data:
    image: ghcr.io/brentio/skyfollower-runner-standing-data:latest
    container_name: skyfollower-runner-standing-data
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

  runner-mictronics:
    image: ghcr.io/brentio/skyfollower-runner-mictronics:latest
    container_name: skyfollower-runner-mictronics
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

  runner-ourairports:
    image: ghcr.io/brentio/skyfollower-runner-ourairports:latest
    container_name: skyfollower-runner-ourairports
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
      # Optional: place phonic_overrides.json in this directory to override
      # spoken airport names without rebuilding the image.
      - ./config/runners/ourairports-data:/app/data
    depends_on:
      - redis
    networks:
      - skyfollower

  runner-us-faa:
    image: ghcr.io/brentio/skyfollower-runner-us-faa:latest
    container_name: skyfollower-runner-us-faa
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

  runner-ca-transport-canada:
    image: ghcr.io/brentio/skyfollower-runner-ca-transport-canada:latest
    container_name: skyfollower-runner-ca-transport-canada
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

  runner-flightaware:
    image: ghcr.io/brentio/skyfollower-runner-flightaware:latest
    container_name: skyfollower-runner-flightaware
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------

volumes:
  rabbitmq-data:
  redis-data:
  receiver-queue:
  processor-0-archive:
  # processor-1-archive:
  archive-data:

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------

networks:
  skyfollower:
    driver: bridge
