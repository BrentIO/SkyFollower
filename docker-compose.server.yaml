name: skyfollower-server

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: skyfollower
      RABBITMQ_DEFAULT_PASS: change_me

  redis:
    image: redis/redis-stack-server:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-stack-server --appendonly yes

  # ---------------------------------------------------------------------------
  # Scheduler
  # ---------------------------------------------------------------------------

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    profiles: ["runners"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/ofelia/config.ini:/etc/ofelia/config.ini:ro
    depends_on:
      - runner-standing-data
      - runner-mictronics
      - runner-ourairports
      - runner-us-faa
      - runner-ca-transport-canada
      - runner-nz-caa
      - runner-no-caa
      - runner-au-casa
      - runner-fr-dgac
      - runner-nl-ilt
      - runner-bs-caa
      - runner-ch-bazl
      - runner-at-austrocontrol
      - runner-ky-caa
      - runner-uk-caa
      - runner-br-anac
      - runner-is-samgongustofa
      - runner-lu-dac
      - runner-bz-bdca
      - runner-im-ardis
      - runner-es-aesa
      - runner-kr-koca
      - runner-mk-caa
      - runner-pg-casapng
      - runner-rs-cad
      - runner-sg-caas
      - runner-sk-nsat
      - runner-tc-caa
      - runner-flightaware

  # ---------------------------------------------------------------------------
  # Data runners — created stopped; started on schedule by ofelia.
  #
  # To initialise before first scheduled run:
  #   docker compose -f docker-compose.server.yaml --profile runners up --no-start
  # To run a runner manually:
  #   docker compose -f docker-compose.server.yaml run --rm runner-ourairports
  # ---------------------------------------------------------------------------

  runner-standing-data:
    image: ghcr.io/brentio/skyfollower-runner-standing-data:latest
    container_name: skyfollower-runner-standing-data
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis

  runner-mictronics:
    image: ghcr.io/brentio/skyfollower-runner-mictronics:latest
    container_name: skyfollower-runner-mictronics
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis

  runner-ourairports:
    image: ghcr.io/brentio/skyfollower-runner-ourairports:latest
    container_name: skyfollower-runner-ourairports
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
      # Optional: place phonic_overrides.json in this directory to override
      # spoken airport names without rebuilding the image.
      - ./config/runners/ourairports-data:/app/data
    depends_on:
      - redis

  runner-us-faa:
    image: ghcr.io/brentio/skyfollower-runner-us-faa:latest
    container_name: skyfollower-runner-us-faa
