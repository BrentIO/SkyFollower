services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USERNAME}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    networks:
      - skyfollower

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - skyfollower

  # ---------------------------------------------------------------------------
  # Scheduler
  # ---------------------------------------------------------------------------

  ofelia:
    image: mcuadros/ofelia:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/ofelia/config.ini:/etc/ofelia/config.ini:ro
    depends_on:
      - runner-standing-data
      - runner-mictronics
      - runner-ourairports
      - runner-us-faa
      - runner-ca-transport-canada
      - runner-flightaware
    networks:
      - skyfollower

  # ---------------------------------------------------------------------------
  # Data runners — created stopped; started on schedule by ofelia.
  #
  # To initialise before first scheduled run:
  #   docker compose -f docker-compose.server.yaml --profile runners up --no-start
  # To run a runner manually:
  #   docker compose -f docker-compose.server.yaml run --rm runner-ourairports
  # ---------------------------------------------------------------------------

  runner-standing-data:
    image: ghcr.io/brentio/skyfollower-runner-standing-data:latest
    container_name: skyfollower-runner-standing-data
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

  runner-mictronics:
    image: ghcr.io/brentio/skyfollower-runner-mictronics:latest
    container_name: skyfollower-runner-mictronics
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

  runner-ourairports:
    image: ghcr.io/brentio/skyfollower-runner-ourairports:latest
    container_name: skyfollower-runner-ourairports
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
      # Optional: place phonic_overrides.json in this directory to override
      # spoken airport names without rebuilding the image.
      - ./config/runners/ourairports-data:/app/data
    depends_on:
      - redis
    networks:
      - skyfollower

  runner-us-faa:
    image: ghcr.io/brentio/skyfollower-runner-us-faa:latest
    container_name: skyfollower-runner-us-faa
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

  runner-ca-transport-canada:
    image: ghcr.io/brentio/skyfollower-runner-ca-transport-canada:latest
    container_name: skyfollower-runner-ca-transport-canada
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

  runner-flightaware:
    image: ghcr.io/brentio/skyfollower-runner-flightaware:latest
    container_name: skyfollower-runner-flightaware
    profiles: ["runners"]
    volumes:
      - ./config/runners/settings.json:/app/settings.json:ro
    depends_on:
      - redis
    networks:
      - skyfollower

volumes:
  rabbitmq-data:
  redis-data:

networks:
  skyfollower:
    driver: bridge
