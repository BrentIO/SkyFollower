          manufactured_date:
            type: datetime
            description: "Date of manufacture as ISO 8601 UTC datetime; FAA is year-only precision (January 1 assumed); TC is nominally full date but 99.8% of records are also January 1"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: YEAR MFR
                position: 4
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "FAA provides 4-digit year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: ca-tc
                file: carscurr.txt
                field: DATE_MANUFACTURE_ASSEMBLY
                position: 31
                precision: date
                transform:
                  type: format_string
                  pattern: "{value.replace('/', '-')}T00:00:00Z"
                  description: "TC provides YYYY/MM/DD — reformat separators and append UTC time"
                  skip_if_empty: true
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Byggeår
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "Norway provides 4-digit build year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Built
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "ILT provides 4-digit build year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: au-casa
                file: acrftreg
                field: Yearmanu
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "CASA provides 4-digit manufacture year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.YearBuild
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "UK CAA provides 4-digit build year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: ch-bazl
                endpoint: bulk
                field: " Year of Manufacture"
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "BAZL provides 4-digit manufacture year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: br-anac
                file: dados_aeronaves.json
                field: NRANOFABRICACAO
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "ANAC provides 4-digit manufacture year only; null for some records — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: es-aesa
                file: aeronaves_inscritas.pdf
                field: "Año cons."
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "4-digit construction year; 1900 is a placeholder for unknown year — omit; January 1 at midnight UTC assumed"
                  skip_if_empty: true
                  skip_if_value: "1900"
              - source: cz-caa
                endpoint: detail
                field: manufacture_year
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "Integer year; 0 or null treated as absent — January 1 at midnight UTC assumed"
                  skip_if_empty: true
                  skip_if_value: 0
              - source: me-caa
                page: detail
                field: "Year Built"
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "4-digit integer year; January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: is-samgongustofa
                endpoint: bulk
                field: productionYear
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "Integer year; 0 treated as absent — January 1 at midnight UTC assumed"
                  skip_if_empty: true
                  skip_if_value: 0
              - source: kr-koca
                file: statListEn01.do (JSON datatable)
                field: AIR_BUILD_DATE
                description: "YY.MM.DD string; pivot year 50 (>=50 → 19xx, <50 → 20xx); output as YYYY-MM-DD"
                skip_if_empty: true
              - source: hu-kozhaf
                file: "Aircraft register PDF (date-stamped, discovered via index page)"
                field: "3"
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "4-digit manufacture year; January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: ge-gcaa
                field: "5"
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "4-digit manufacture year; January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: kg-caa
                field: "6"
                description: "DD.MM.YYYY → YYYY-MM-DD; month-name YYYY (Russian or English) → YYYY-MM-01"
                skip_if_empty: true
              - source: lv-caa
                field: Construction_Year
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "Integer year; January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: mv-caa
                file: "Aircraft register PDF (opaque hash filename; discovered via index page)"
                field: "6"
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "4-digit year; January 1 at midnight UTC assumed"
                  skip_if_empty: true

          wake_turbulence_category:
            type: string
            description: "ICAO wake turbulence category (Light, Medium, Heavy, Super)"
            persisted: true
            sources:
              - source: mictronics
                file: types.json
                field: "values[2]"
                transform:
                  type: decode_table
                  values:
                    "J": Super
                    "H": Heavy
                    "M": Medium
                    "L": Light
                    "M/L": "Medium/Light"
                    "-": "Unknown/None"
              - source: uk-caa
                endpoint: details
                field: "AircraftDetails.ICAOAircraftTypeDesignator"
                transform:
                  type: redis_lookup
                  lookup_key: "aircraft:type:{type_designator}"
                  lookup_field: wake_turbulence_category
                  description: "field above (ICAOAircraftTypeDesignator) supplies {type_designator} used to build lookup_key; lookup_field is the property read from that looked-up aircraft:type document (see records.aircraft_type), already decoded, and copied as-is to this field. Unconditional — written regardless of whether mictronics also has a value for the same hex, since registry wins over mictronics on read via merge_aircraft.lua either way"
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: "ICAO-code"
                transform:
                  type: redis_lookup
                  lookup_key: "aircraft:type:{type_designator}"
                  lookup_field: wake_turbulence_category
                  description: "field above (ICAO-code) supplies {type_designator} used to build lookup_key; lookup_field is the property read from that looked-up aircraft:type document (see records.aircraft_type), already decoded, and copied as-is to this field. Unconditional — written regardless of whether mictronics also has a value for the same hex, since registry wins over mictronics on read via merge_aircraft.lua either way"
              - source: au-casa
                file: acrftreg
                field: ICAOtypedesig
                transform:
                  type: redis_lookup
                  lookup_key: "aircraft:type:{type_designator}"
                  lookup_field: wake_turbulence_category
                  description: "field above (ICAOtypedesig) supplies {type_designator} used to build lookup_key; lookup_field is the property read from that looked-up aircraft:type document (see records.aircraft_type), already decoded, and copied as-is to this field. Unconditional — written regardless of whether mictronics also has a value for the same hex, since registry wins over mictronics on read via merge_aircraft.lua either way"
              - source: ch-bazl
                endpoint: bulk
                field: "ICAO Aircraft Type"
                transform:
                  type: redis_lookup
                  lookup_key: "aircraft:type:{type_designator}"
                  lookup_field: wake_turbulence_category
                  description: "field above (ICAO Aircraft Type) supplies {type_designator} used to build lookup_key; lookup_field is the property read from that looked-up aircraft:type document (see records.aircraft_type), already decoded, and copied as-is to this field. Unconditional — written regardless of whether mictronics also has a value for the same hex, since registry wins over mictronics on read via merge_aircraft.lua either way"
              - source: br-anac
                file: dados_aeronaves.json
                field: CDTIPOICAO
                transform:
                  type: redis_lookup
                  lookup_key: "aircraft:type:{type_designator}"
                  lookup_field: wake_turbulence_category
                  description: "field above (CDTIPOICAO) supplies {type_designator} used to build lookup_key; lookup_field is the property read from that looked-up aircraft:type document (see records.aircraft_type), already decoded, and copied as-is to this field. Unconditional — written regardless of whether mictronics also has a value for the same hex, since registry wins over mictronics on read via merge_aircraft.lua either way"

          aircraft_type:
            type: object
            description: >
              ICAO type-designator reference record from Mictronics, keyed by
              type_designator (aircraft:type:{designator}). Standalone lookup
              table, not merged into per-hex enrichment records by
              merge_aircraft.lua — published so other runners (e.g. country
              registries that only know a type_designator, not a full
              manufacturer_model) can look up a designator directly via
              JSON.GET, including for hexes Mictronics itself has no
              aircrafts.json entry for. Entries with no manufacturer_model are
              skipped at write time. Distinct from this aircraft object's own
              type_designator/manufacturer_model/wake_turbulence_category
              fields above, which are the per-hex values merged from
              aircraft:mictronics:{hex} and aircraft:registry:{hex} by
              merge_aircraft.lua — this block describes the separate global
              lookup table, not any specific aircraft's merged enrichment.
            persisted: true
            properties:
              type_designator:
                type: string
                description: "ICAO aircraft type designator (e.g. B763); also the Redis key suffix"
                sources:
                  - source: mictronics
                    file: types.json
                    field: "key (type_designator)"
              manufacturer_model:
                type: string
                description: "Full manufacturer + model string (e.g. Boeing 767-332ER)"
                sources:
                  - source: mictronics
                    file: types.json
                    field: "values[0]"
              wake_turbulence_category:
                type: string
                description: "ICAO wake turbulence category (Light, Medium, Heavy, Super); omitted if undecodable"
                sources:
                  - source: mictronics
                    file: types.json
                    field: "values[2]"
                    transform:
                      type: decode_table
                      values:
                        "J": Super
                        "H": Heavy
                        "M": Medium
                        "L": Light
                        "M/L": "Medium/Light"
                        "-": "Unknown/None"

          powerplant:
            type: object
            description: "Engine and powerplant specification data"
            persisted: true
            properties:

              count:
                type: integer
                description: "Number of engines installed"
                persisted: true
                sources:
                  - source: us-faa
                    file: acftref.txt
                    field: NO-ENG
                    position: 7
                  - source: ca-tc
                    file: carscurr.txt
                    field: NUMBER_OF_ENGINES
                    position: 17
                  - source: nl-ilt
                    file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                    field: Engines
                  - source: au-casa
                    file: acrftreg
                    field: engnum
                  - source: uk-caa
                    endpoint: details
                    field: "AircraftDetails.Engines[0].TotalNumberOfEngines"
                  - source: br-anac
                    file: dados_aeronaves.json
                    field: CDCLS
                    transform:
                      type: decode_character
                      position: 1
                      description: "Position 2 (index 1) of CDCLS is the engine count digit; '0' or absent = omit; omitted for RPA (drone) records"
                  - source: es-aesa
                    file: aeronaves_inscritas.pdf
                    field: "Nº mot."
                    transform:
                      type: parse_integer
                  - source: cz-caa
                    endpoint: detail
                    field: engine_count
                    skip_if_empty: true
                    skip_if_value: 0

              type:
                type: string
                description: "Engine type (Reciprocating, Turbo-fan, etc.)"
                persisted: true
                sources:
                  - source: us-faa
                    file: acftref.txt
                    field: TYPE-ENG
                    position: 4
                    transform:
                      type: decode_table
                      values:
                        "0": None
                        "1": Piston
                        "2": Turbo-prop
                        "3": Turbo-shaft
                        "4": Turbo-jet
                        "5": Turbo-fan
                        "6": Ramjet
                        "7": 2 Cycle
                        "8": 4 Cycle
                        "9": Unknown
                        "10": Electric
                        "11": Rotary
                  - source: ca-tc
                    file: carscurr.txt
                    field: ENGINE_CATEGORY_E
                    position: 15
                    transform:
                      type: decode_table
                      values:
                        "Piston": Piston
                        "Turbo Fan": Turbo-fan
                        "Turbo Prop": Turbo-prop
                        "Turbo Shaft": Turbo-shaft
                        "Turbo Jet": Turbo-jet
                        "Electric": Electric
                        "Other": Unknown
                  - source: nl-ilt
                    file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                    field: EngKind
                    skip_if_value: "Engine - not defined"
                    transform:
                      type: decode_table_passthrough
                      description: "Mapped to canonical type; blank → omit; unknown values pass through unmodified"
                      values:
                        "Reciprocating piston-driven engine": Piston
                        "Reciprocating piston radial engine": Piston
                        "Piston-driven shaft (rotorcraft) engine": Piston
                        "Reciprocating piston-driven Diesel engine": Diesel
                        "Electrical engine": Electric
                        "Turbofan engine": Turbo-fan
                        "Turbine-driven shaft (rotorcraft) engine": Turbo-shaft
                        "Turbine-driven propeller engine": Turbo-prop
                        "Turbojet engine": Turbo-jet
                        "Wankel engine": Rotary
                  - source: au-casa
                    file: acrftreg
                    field: Engtype
                    skip_if_value: "Not Applicable"
                    transform:
                      type: decode_table_passthrough
                      description: "Mapped to canonical type; unknown values pass through unmodified"
                      values:
                        "Piston": Piston
                        "Turbofan": Turbo-fan
                        "Turboprop": Turbo-prop
                        "Turboshaft": Turbo-shaft
                        "Turbojet": Turbo-jet
                        "Electric": Electric
                        "Diesel Engine": Diesel
                        "Rotary": Rotary
                  - source: ch-bazl
                    endpoint: bulk
                    field: " Engine Category"
                    transform:
                      type: decode_table_passthrough
                      description: "Mapped to canonical type; comma-separated multi-engine entries take first value; unknown values pass through unmodified"
                      values:
                        "Piston Engine": Piston
                        "Turboshaft Engine": Turbo-shaft
                        "Turboprop Engine": Turbo-prop
                        "Jet Engine": Turbo-jet
                        "Electrical Engine": Electric
                        "Hydrogen-Electric": Hydrogen-Electric
                  - source: br-anac
                    file: dados_aeronaves.json
                    field: CDCLS
                    transform:
                      type: decode_character
                      position: 2
                      description: "Position 3 (index 2) of CDCLS is the propulsion code; T is context-sensitive: Turbo-shaft when CDCLS[0]='H' (helicopter), otherwise Turbo-prop; omitted for RPA (drone) records or when position is '0' or absent"
                      values:
                        "P": Piston
                        "J": Turbo-jet
                        "E": Electric
                        "T": "Turbo-prop (or Turbo-shaft for helicopters — see description)"
                  - source: cz-caa
                    endpoint: detail
                    field: engine_type
                    skip_if_value: "NO_ENGINE"
                    transform:
                      type: decode_table
                      values:
                        "PISTON": Piston
                        "TURBINE": Turbine
                        "TURBOSHAFT": Turboshaft
                        "ELECTRIC": Electric

              model:
                type: string
                description: "Engine model designation (e.g. LEAP-1B28)"
                persisted: true
                sources:
                  - source: us-faa
                    file: engine.txt
                    field: MODEL
                    position: 2
                    join: "master.txt[3] → engine.txt[0]"
                  - source: nl-ilt
                    file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                    field: EngModel
                    notes: "Values containing 'not further defined' are omitted"
                  - source: au-casa
                    file: acrftreg
                    field: Engmodel
                  - source: uk-caa
                    endpoint: details
                    field: "AircraftDetails.Engines[0].Name"
                  - source: ch-bazl
                    endpoint: bulk
                    field: " Engine"
                    transform:
                      type: split_first
                      delimiter: ", "
                      description: "Comma-separated multi-engine entries take first value (e.g. 'CFM56-5B4/3, CFM56-5B4/P' → 'CFM56-5B4/3')"
                  - source: es-aesa
                    file: aeronaves_inscritas.pdf
                    field: "Modelo Motor"
                  - source: sg-caas
                    file: Aircraft-Register-as-at-{MonYYYY}.xlsx
                    field: Engine Model

              manufacturer:
                type: string
                description: "Engine manufacturer name"
                persisted: true
                sources:
                  - source: us-faa
                    file: engine.txt
                    field: MFR
                    position: 1
                    join: "master.txt[3] → engine.txt[0]"
                  - source: ca-tc
                    file: carscurr.txt
                    field: ENGINE_MANUF_E
                    position: 13
                  - source: nl-ilt
                    file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                    field: EngManufacturer
                    notes: "Values of 'Unknown' are omitted"
                  - source: au-casa
                    file: acrftreg
                    field: Engmanu
                  - source: ch-bazl
                    endpoint: bulk
                    field: " Engine manufacturer"
                  - source: es-aesa
                    file: aeronaves_inscritas.pdf
                    field: "Marca Motor"
                  - source: sg-caas
                    file: Aircraft-Register-as-at-{MonYYYY}.xlsx
                    field: Engine Manufacturer

              power_type:
                type: string
                description: "Power rating unit — Horsepower (piston/turbo-prop) or Thrust (jet)"
                persisted: true
                sources:
                  - source: us-faa
                    file: engine.txt
                    description: "Derived from engine TYPE; piston/prop → Horsepower; jet → Thrust"

              power_value:
                type: integer
                description: "Rated power output in horsepower or pounds of thrust"
                persisted: true
                sources:
                  - source: us-faa
                    file: engine.txt
                    description: "HORSEPOWER or THRUST column depending on engine type"

