# SkyFollower Data Dictionary
#
# Defines the canonical completed-flight record: field types, data sources,
# column positions, transforms, and persistence rules.
#
# Merge strategy: within each field's sources list, the FIRST source that
# provides a non-null value wins, unless merge_strategy is overridden for
# that field.
#
# Computed fallback fields: some fields may be synthesized at read time from
# other fields already present on the merged record when no source provides
# them directly — distinct from the normal per-field sources[] priority list
# above, since the fallback is computed in shared/lua/merge_aircraft.lua, not
# written by any runner. manufacturer_model is the first instance of this
# pattern (see aircraft.manufacturer_model below): when absent after the
# mictronics/registry merge, it is composed from aircraft.manufacturer /
# aircraft.model, whichever are present. The computed value is never written
# back to Redis, so it self-heals the moment a real source value appears.
#
# persisted: true  (default) — field is written to the S3 archive record.
# persisted: false — field is used during processing only; omitted on persist.
#
# persist_as — overrides the persisted shape for object fields that collapse
# to a scalar on write (e.g. origin/destination objects → ICAO code string).
#
# Encoding: all string values stored in Redis are UTF-8 encoded as-is (no
# \uXXXX escaping of non-ASCII characters). Every runner writes JSON via
# shared.redis_json.set_json(), which serializes with ensure_ascii=False.

version: "9999.99.99"
description: >
  Field-level data dictionary for SkyFollower record types. Defines sources,
  column positions, transforms, merge priority, and persistence rules for each
  field in every record type. Add new record types under records: as the
  project expands.

merge_strategy_default: first_wins

# ── Source definitions ───────────────────────────────────────────────────────
# Sources listed here are referenced by name throughout the fields section.
# The order within each field's sources[] list defines priority.

sources:

  mictronics:
    description: "Mictronics global aircraft database — type designators, military/interesting flags, and operators"
    url: "https://github.com/Mictronics/aircraft-database/raw/refs/heads/main/indexedDB.zip"
    format: zip+json
    cadence: weekly_tuesday
    files:
      - name: aircrafts.json
        format: "object: icao_hex → [registration, type_designator, flags_string]"
        notes: "flags_string is a 2-char string; [0]='1' → military, [1]='1' → interesting"
      - name: types.json
        format: "object: type_designator → [manufacturer_model, description, wtc_code]"
        notes: "Joined against aircrafts.json for per-hex enrichment, and also published standalone as aircraft:type:{designator} — see records.flight.fields.aircraft_type"
      - name: operators.json
        format: "object: airline_designator → [name, country, callsign]"

  us-faa:
    description: "FAA Releasable Aircraft Database — US N-number registrations"
    url: "https://registry.faa.gov/database/ReleasableAircraft.zip"
    format: zip+csv
    cadence: weekly_saturday
    notes: "Requires User-Agent: 'P5Software AROI' header; 2017+ column layout"
    files:
      - name: master.txt
        format: csv
        description: "Active N-number registrations"
        columns:
          0:  N-NUMBER
          1:  SERIAL NUMBER
          2:  MFR MDL CODE
          3:  ENG MFR MDL CODE
          4:  YEAR MFR
          5:  TYPE REGISTRANT
          6:  NAME
          7:  STREET
          8:  STREET2
          9:  CITY
          10: STATE
          11: ZIP CODE
          12: REGION
          13: COUNTY
          14: COUNTRY
          24: "OTHER NAMES(1)"
          25: "OTHER NAMES(2)"
          26: "OTHER NAMES(3)"
          27: "OTHER NAMES(4)"
          28: "OTHER NAMES(5)"
          33: MODE S CODE HEX
      - name: acftref.txt
        format: csv
        description: "Aircraft type reference; joined via master.txt MFR MDL CODE"
        columns:
          0: CODE
          1: MFG
          2: MODEL
          3: TYPE-ACFT
          4: TYPE-ENG
          5: CLASS
          7: NO-ENG
          8: NO-SEATS
          9: AC-WEIGHT
      - name: engine.txt
        format: csv
        description: "Engine reference; joined via master.txt ENG MFR MDL CODE"
        columns:
          0: CODE
          1: MFR
          2: MODEL
          3: TYPE
          4: HORSEPOWER
          5: THRUST

  ca-tc:
    description: "Transport Canada Civil Aircraft Register — Canadian C- registrations"
    url: "https://wwwapps.tc.gc.ca/Saf-Sec-Sur/2/CCARCS-RIACC/ReleaseAccessEN.aspx"
    format: zip+csv
    cadence: weekly_sunday
    notes: "Owner data is in carsownr.txt (separate file); multiple rows per mark possible"
    files:
      - name: carscurr.txt
        format: csv
        description: "Primary aircraft registration record; one row per mark"
        columns:
          0:  MARK
          3:  COMMON_NAME
          4:  MODEL_NAME
          5:  MANUFACTURERS_SERIAL_NUMBER
          7:  ID_PLATE_MANUFACTURERS_NAME
          10: AIRCRAFT_CATEGORY_E
          13: ENGINE_MANUF_E
          15: ENGINE_CATEGORY_E
          17: NUMBER_OF_ENGINES
          18: NUMBER_OF_SEATS
          31: DATE_MANUFACTURE_ASSEMBLY
          42: MODE_S_TRANSPONDER_BINARY
          46: TRIMMED_MARK
      - name: carsownr.txt
        format: csv
        description: "Owner/registrant records; joined to carscurr.txt by MARK_LINK = MARK"
        join: "carsownr.txt[0] MARK_LINK = carscurr.txt[0] MARK"
        columns:
          0:  MARK_LINK
          1:  FULL_NAME
          2:  TRADE_NAME
          3:  STREET_NAME
          4:  STREET_NAME2
          5:  CITY
          6:  PROVINCE_OR_STATE_E
          8:  POSTAL_CODE
          9:  COUNTRY_E
          11: TYPE_OF_OWNER_E
          13: "ACTIVE_FLAG; not stored"
        filter:
          field: "13"
          skip_if_not_value: A
        notes: "TYPE_OF_OWNER_E stores decoded English strings ('Individual', 'Entity') not raw codes; COUNTRY_E stores full country name (e.g. 'CANADA') not ISO code"

  no-caa:
    description: "Norway Civil Aviation Authority (CAA) aircraft register — LN-prefix registrations"
    url: "https://data.caa.no/nlr/norgesluftfartoyregister.json"
    format: json
    cadence: weekly_wednesday
    notes: "JSON object with 'headers' and 'data' keys; ~1,038 records; owner country field uses Norwegian names for Norway/Sweden/Denmark and English names for all others; Eier(e) array may contain multiple owners — Eier/Kontakt entry used for address fields"
    files:
      - name: norgesluftfartoyregister.json
        format: "object: { headers, data: [ record, ... ] }"
        fields:
          Registreringsmerke:               registration mark (LN- prefix)
          Kategori:                         aircraft category (Fly, Helikopter, Seilfly, Ballong)
          Type:                             aircraft model designation
          Produsent:                        aircraft manufacturer/builder
          Serienummer:                      manufacturer serial number
          Byggeår:                          4-digit build year
          "Eier(e)":                        "array of owner objects; each has Eier type, Navn, Gateadresse, Postnummer, Poststed, Land"
          "ICAO 24-bits adresse":           "array of objects keyed Desimal/Binær/Oktal/Heksadesimal"

  fr-dgac:
    description: "France Direction Générale de l'Aviation Civile (DGAC) aircraft register — F-prefix registrations"
    url: "https://immat.aviation-civile.gouv.fr/immat/servlet/static/upload/export.csv"
    format: csv
    cadence: weekly_wednesday
    notes: "UTF-8 with BOM (decode utf-8-sig); semicolon-delimited; ~43,069 rows with 40,522 unique F- registrations; co-ownership rows share IMMATRICULATION — group by registration, collect all unique PROPRIETAIRE names, use first non-blank ADRESSE_PROPRIETAIRE for address; no ICAO hex — resolved via RediSearch reverse-lookup against Mictronics records; must run after Mictronics; GDPR blanks mean ~45% have PROPRIETAIRE and ~24% have ADRESSE_PROPRIETAIRE; country names in French"
    files:
      - name: export.csv
        format: csv
        delimiter: ";"
        columns:
          IMMATRICULATION:           registration mark (F- prefix already present)
          CONSTRUCTEUR:              aircraft manufacturer
          MODELE:                    aircraft model
          NUMERO_SERIE:              serial number
          AERODROME_ATTACHE:         home aerodrome name (dropped — not an ICAO code)
          PROPRIETAIRE:              registrant name (blank for individuals per GDPR)
          ADRESSE_PROPRIETAIRE:      free-text registrant address; country names in French
          LOCATAIRE:                 lessee name (dropped)
          ADRESSE_LOCATAIRE:         lessee address (dropped)
          CREANCIER_HYPOTHEQUE:      mortgage creditor (dropped)
          ADRESSE_CREANCIER:         creditor address (dropped)
          PERSONNE_SAISISSANTE:      seizure person (dropped)
          ADRESSE_PERSONNE_SAISISSANTE: seizure person address (dropped)

  nl-ilt:
    description: "Netherlands Inspectie Leefomgeving en Transport (ILT) civil aircraft register — PH-prefix registrations"
    url: "https://www.ilent.nl/documenten/lijsten/luchtvaart/databestanden/luchtvaartregister-data"
    format: ods
    cadence: weekly_thursday
    notes: "ODS (OpenDocument Spreadsheet) parsed with odfpy; URL is date-stamped and changes monthly — runner scrapes the ILT index page to discover the current link; ~3,225 records with valid ICAO hex; row 0 = annotated headers (bracket annotations stripped), row 1 = informational text (skipped), row 2+ = data; cells may carry numbercolumnsrepeated attribute — must be expanded to avoid column misalignment; ICAO hex is published directly in X-Ponder column so no RediSearch reverse-lookup required; no owner/registrant data published; filter rows where X-Ponder is not a valid 6-char hex (covers deregistered records); EngManufacturer='Unknown' and EngModel containing 'not further defined' are omitted; no hard Redis dependency — runs independently of Mictronics and completes successfully even if aircraft:type:{designator} lookups are unavailable, but opportunistically looks up its own ICAO-code against that mictronics-populated reference table to set aircraft.manufacturer_model and aircraft.wake_turbulence_category when found (independently — a type entry with only one of the two still sets that one)"
    files:
      - name: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
        format: ods
        columns:
          Flag:             Registration status flag; not stored
          Registration:     Full PH-prefix registration mark
          Manufacturer:     Aircraft manufacturer name
          Model:            Aircraft model designation
          Serial:           Manufacturer serial number
          X-Ponder:         6-character uppercase ICAO Mode S hex
          Built:            4-digit year of manufacture
          Group:            Aircraft type category code
          ICAO-code:        ICAO 4-character type designator
          Engines:          Number of engines
          EngKind:          Engine type description
          EngManufacturer:  Engine manufacturer name
          EngModel:         Engine model designation
        filter:
          field: X-Ponder
          skip_if_not_pattern: "^[0-9A-Fa-f]{6}$"

  br-anac:
    description: "Brazil ANAC Registro Aeronáutico Brasileiro (RAB) — PP/PR/PT/PS/PU-prefix registrations"
    url: "https://sistemas.anac.gov.br/dadosabertos/Aeronaves/RAB/dados_aeronaves.json"
    format: json
    cadence: weekly_wednesday
    notes: "JSON array, UTF-8 BOM encoded, ~43MB, ~34,551 total records; no ICAO hex — resolved via RediSearch against Mictronics records; must run after Mictronics; MARCA stored without hyphen (PPAJH) — insert hyphen after position 2 (PP-AJH); CDCLS encodes aircraft type (position 1), engine count (position 2), and propulsion (position 3); PROPRIETARIOSJSON uses non-standard /\"\" escape for double-quotes; no hard dependency on the aircraft:type reference table — completes successfully even if aircraft:type:{designator} lookups are unavailable, but opportunistically looks up its own CDTIPOICAO against that mictronics-populated reference table to set aircraft.manufacturer_model and aircraft.wake_turbulence_category when found (independently — a type entry with only one of the two still sets that one)"
    fields:
      MARCA:              Registration mark without hyphen (e.g. PPAJH → PP-AJH)
      DTCANC:             Cancellation date; not stored
      CDINTERDICAO:       Interdiction status code; not stored
      NMFABRICANTE:       Aircraft manufacturer name
      DSMODELO:           Aircraft model designation
      CDTIPOICAO:         ICAO type designator (4-char)
      NRSERIE:            Serial number
      NRASSENTOS:         Number of seats (numeric string)
      NRANOFABRICACAO:    Year of manufacture (4-digit string; may be null)
      CDCLS:              Aircraft classification code
      PROPRIETARIOSJSON:  JSON array of owners; uses non-standard /\"\" escaping for double-quotes
    filter:
      - field: DTCANC
        skip_if_not_empty: true
      - field: CDINTERDICAO
        skip_if_pattern: "^[RM]"

  au-casa:
    description: "Australia Civil Aviation Safety Authority (CASA) aircraft register — VH-prefix registrations"
    url: "https://services.casa.gov.au/CSV/acrftreg.csv"
    format: csv
    cadence: weekly_tuesday
    notes: "UTF-8 with BOM (decode utf-8-sig); ~16,626 rows; no ICAO hex column — icao_hex resolved via RediSearch reverse-lookup by registration against Mictronics records; must run after Mictronics; all marks are 3-char suffixes — prepend 'VH-'; no hard dependency on the aircraft:type reference table — completes successfully even if aircraft:type:{designator} lookups are unavailable, but opportunistically looks up its own ICAOtypedesig against that mictronics-populated reference table to set aircraft.manufacturer_model and aircraft.wake_turbulence_category when found (independently — a type entry with only one of the two still sets that one)"
    files:
      - name: acrftreg
        format: csv
        columns:
          Mark:             3-character registration suffix (prepend VH-)
          suspendstatus:    Registration suspension status
          Airframe:         aircraft category
          Manu:             aircraft manufacturer
          Model:            aircraft model designation
          Serial:           manufacturer serial number
          Yearmanu:         4-digit year of manufacture
          ICAOtypedesig:    ICAO 4-character type designator
          engnum:           number of engines
          Engmanu:          engine manufacturer
          Engtype:          engine type
          Engmodel:         engine model
          regholdname:      registrant name
          regholdadd1:      address line 1
          regholdadd2:      address line 2
          regholdSuburb:    city/suburb
          regholdState:     state or territory abbreviation
          regholdPostcode:  postal code
          regholdCountry:   country name (full English)
        filter:
          field: suspendstatus
          skip_if_value: Suspended

  nz-caa:
    description: "New Zealand Civil Aviation Authority aircraft register — ZK-prefix registrations"
    url: "https://www.aviation.govt.nz/assets/aircraft/aircraft-register/Aircraft-Register-for-website-.csv"
    format: csv
    cadence: weekly_wednesday
    notes: "UTF-8 with BOM; single-file CSV; ~4,000 rows; Owner Address is free-text parsed into address components; 151 rows have blank Owner Address (all 'Private Owner')"
    files:
      - name: Aircraft-Register-for-website-.csv
        format: csv
        columns:
          Model Category:    aircraft type category
          Registration Mark: ZK-prefix registration mark
          Manufacturer:      aircraft manufacturer name
          Model:             aircraft model designation
          Serial No.:        manufacturer serial number
          Owner Name:        registered owner name
          Owner Address:     free-text address (parsed into street/city/postal_code/country)
          Mode S Code HEX:   6-character uppercase hex ICAO address

  bs-caa:
    description: "Bahamas Civil Aviation Authority (CAA) aircraft register — C6-prefix registrations"
    url: "https://caabahamas.com/registers/"
    format: pdf
    cadence: weekly_friday
    notes: "PDF generated from Microsoft Excel; ~139 rows across 3 pages; URL is date-stamped and changes with each update — runner scrapes the CAA registers page to discover the current link; no ICAO hex column — icao_hex resolved via RediSearch reverse-lookup by registration against Mictronics records; must run after Mictronics; no manufacturer column (combined with model in AIRCRAFT TYPE - MAKE/MODEL); no powerplant or address data available; owner name, make/model, and serial number may contain embedded newlines — collapsed to single space"
    files:
      - name: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
        format: pdf
        columns:
          "AIRCRAFT REGISTRATION NUMBER": full C6-prefix registration mark
          "REGISTERED OWNER OF AIRCRAFT": "registered owner name (may contain embedded newlines; collapsed to single space)"
          "AIRCRAFT TYPE - MAKE/MODEL":   "Combined make and model designation (single free-text field; may contain embedded newlines; collapsed to single space)"
          "SERIAL #":                     "manufacturer serial number (may contain embedded newlines; collapsed to single space)"

  ch-bazl:
    description: "Switzerland Federal Office of Civil Aviation (FOCA/BAZL) aircraft register — HB-prefix registrations"
    url: "https://app02.bazl.admin.ch/web/bazl-backend/lfr/csv"
    format: api
    cadence: weekly_tuesday
    notes: "Undocumented public REST API; no auth required; returns UTF-16 BE encoded semicolon-delimited CSV via POST with JSON body; single bulk download of all registered aircraft (~3,100 records); 'Main Owner' address is a single unstructured string parsed best-effort (Name[, Canton]?, Street, PostalCode City, Switzerland); canton abbreviation (2-letter) stripped from name; when only one non-canton segment remains after extracting the postal line it is treated as the name (no street present); MOPSC = Maximum Operational Passenger Seating Configuration; seats = MOPSC + Minimum Crew; aircraft without a Mode S transponder have no ICAO hex in the registry and are skipped; no hard dependency on the aircraft:type reference table — completes successfully even if aircraft:type:{designator} lookups are unavailable, but opportunistically looks up its own ICAO Aircraft Type against that mictronics-populated reference table to set aircraft.manufacturer_model and aircraft.wake_turbulence_category when found (independently — a type entry with only one of the two still sets that one)"
    endpoints:
      bulk:
        method: POST
        path: /lfr/csv
        body:
          page_result_limit: 10000
          current_page_number: 1
          sort_list: registration
          language: en
          queryProperties:
            aircraftStatus: ["Registered"]
        description: "Full register download; response is UTF-16 BE CSV with semicolon delimiters; columns have a leading space in their names"

  at-austrocontrol:
    description: "Austria Austrocontrol aircraft register — OE-prefix registrations"
    url: "https://www.austrocontrol.at/lfa-publish-service/v2/oenfl/luftfahrzeuge"
    format: api
    cadence: weekly_tuesday
    notes: "Undocumented public REST API; no auth required; returns flat JSON array of all registered aircraft (~1,874 records); loeschung (deregistration date) is null for all returned records — API appears pre-filtered to active aircraft; no ICAO hex — icao_hex resolved via RediSearch reverse-lookup by OE-{kennzeichen} registration against Mictronics records; must run after Mictronics; all kennzeichen receive OE- prefix (alpha-only e.g. OE-ARG and digit-only e.g. OE-9522); halter (owner) is \\r\\n-delimited multiline string; groups of three lines per co-owner (name, PostalCode City, Street, country); only first owner group used"
    endpoints:
      bulk:
        method: GET
        path: "/lfa-publish-service/v2/oenfl/luftfahrzeuge?page=0&size=10000"
        description: "Full register download; returns flat JSON array; all active registered aircraft in one page"

  is-samgongustofa:
    description: "Iceland Samgöngustofa (Transport Authority) aircraft register — TF-prefix registrations"
    url: "https://island.is/api/graphql"
    format: api
    cadence: weekly_wednesday
    notes: "Apollo Persisted Query (GET with operationName=GetAllAircrafts, pageSize=10000); returns all active registered TF- aircraft in a single response (~355 records); no ICAO hex — icao_hex resolved via RediSearch reverse-lookup by TF- registration against Mictronics records; must run after Mictronics; registration mark stored in 'identifiers' field; each aircraft carries both an operator object and a structurally identical owners array — only owners is used (operator intentionally not tracked; live data confirms the two differ on ~20% of records, e.g. leased aircraft); owners may be empty; all owner names collected, but street/city/postcode/country taken from the first owner only (co-ownership is common); productionYear=0 treated as absent; country names are Icelandic (Ísland) and are mapped to ISO 3166-1 alpha-2"
    endpoints:
      bulk:
        method: GET
        path: "/api/graphql?operationName=GetAllAircrafts&variables=%7B%22input%22%3A%7B%22pageNumber%22%3A1%2C%22pageSize%22%3A10000%7D%7D&extensions=%7B%22persistedQuery%22%3A%7B%22version%22%3A1%2C%22sha256Hash%22%3A%22e2fc04031e25ffd8532d5f917192aefc40a2e2407b113cc1b264c7ecb852a819%22%7D%7D"
        description: "Full register download via Apollo Persisted Query; returns all active registered aircraft"
        response_path: "data.aircraftRegistryAllAircrafts.aircrafts"
    fields:
      identifiers:             Full TF-prefix registration mark
      type:                    Aircraft model/type name
      serialNumber:            Manufacturer serial number
      productionYear:          Year of manufacture (integer; 0 = absent)
      operator.name:           "Structurally identical to owners[]; present in source, intentionally not read"
      "owners[*].name":        Registered owner name (all entries collected)
      "owners[*].address":     Street address (first owner only)
      "owners[*].city":        City (first owner only)
      "owners[*].postcode":    Postal code (first owner only)
      "owners[*].country":     Country name (Icelandic or English; first owner only)

  lu-dac:
    description: "Luxembourg Directorate of Civil Aviation (DAC) aircraft register — LX-prefix registrations"
    url: "https://dac.gouvernement.lu/en/administration/departements/navigabilite/immatriculation-aeronefs/releve-immatriculations.html"
    format: pdf
    cadence: weekly_wednesday
    notes: "~20-page PDF, ~298 records; URL is date-stamped (relev-aronefs-DD-MM-YYYY.pdf) and changes with each update — runner scrapes the index page to discover the current link; pdfplumber.extract_table() does not correctly detect the 6th column — uses word-position extraction instead; column x0 boundaries: [44,98,256,421,489,639,842]; rows where immat starts with 'LX-' begin a new record; subsequent rows without LX- are continuation rows for multi-line cells; only Propriétaire (owner) stored as registrant.names — Exploitant (operator) present in source but not read; privacy placeholders excluded from registrant.names: PROPRIÉTAIRE PRIVÉ, COPROPRIÉTÉ; no ICAO hex — resolved via RediSearch reverse-lookup against Mictronics; must run after Mictronics; no address/city/country data available; ICAO hex range: 4A0000–4AFFFF"
    files:
      - name: "relev-aronefs-{DD}-{MM}-{YYYY}.pdf"
        format: pdf
        columns:
          Immat:              Full LX-prefix registration mark
          Constructeur:       Aircraft manufacturer name
          "Type d'aéronef":   Aircraft model designation
          "SN aéronef":       Manufacturer serial number
          Exploitant:         "Operator name; not stored"
          Propriétaire:       Owner name (may be privacy placeholder PROPRIÉTAIRE PRIVÉ or COPROPRIÉTÉ)

  bz-bdca:
    description: "Belize Department of Civil Aviation (BDCA) civil aircraft register — V3-prefix registrations"
    url: "https://www.civilaviation.gov.bz/index.php/bdca-civil-aircraft-register"
    format: html
    cadence: weekly_wednesday
    notes: "Single static HTML table page; ~67 records; no ICAO hex — resolved via RediSearch reverse-lookup against Mictronics records; must run after Mictronics; no deregistration column — all rows assumed active; Owner field may contain '(Charterer by Demise)' suffix — stripped before storing; serial number '–' (em-dash) treated as null; Address column split on first comma: street before, city after; if no comma, stored as registrant.city only; ICAO hex range: 084000–084FFF"
    files:
      - name: bdca-civil-aircraft-register (HTML page)
        format: html_table
        columns:
          "Registration Number":  Full V3-prefix registration mark
          "Manufacturer, Model":  Combined manufacturer and model designation
          "Serial Number":        Manufacturer serial number (em-dash '–' indicates no value)
          Owner:                  Registered owner name (may include '(Charterer by Demise)' suffix)
          Address:                Free-text address; may be comma-delimited street and city

  im-ardis:
    description: "Isle of Man Aircraft Registry (ARDIS) — M-prefix registrations"
    url: "https://ardis.iomaircraftregistry.com/register/search"
    format: html
    cadence: weekly_thursday
    notes: "CSRF-protected HTML search form; GET page to extract __RequestVerificationToken, then POST with page size 50000 to retrieve all records; ~1449 total rows including deregistered; ~271 active records; Mode S Number column provides ICAO hex directly — no RediSearch reverse-lookup needed; Registered Owners field split on first comma: name before, street address after; Registration Mark header cell contains a sort link that causes get_text() to duplicate the column name — stripped via backreference regex; ICAO hex range: 43E000–43EFFF"
    files:
      - name: ARDIS search results (HTML table)
        format: html_table
        columns:
          "Registration Mark":    Full M-prefix registration mark
          "Aircraft Status":      Registration status; not stored
          "Aircraft Manufacturer": Manufacturer name
          "Aircraft Type":        Model/type designation
          "Serial Number":        Manufacturer serial number
          "Mode S Number":        6-char uppercase ICAO hex
          "Registered Owners":    Owner name and address combined
        filter:
          field: "Aircraft Status"
          skip_if_value: Deregistered

  es-aesa:
    description: "Spain AESA (Agencia Estatal de Seguridad Aérea) aircraft register — EC-prefix registrations"
    url: "https://www.seguridadaerea.gob.es/sites/default/files/aeronaves_inscritas.pdf"
    format: pdf
    cadence: weekly_thursday
    notes: "Static PDF URL (~4 MB, ~314 pages, ~241 EC- records); pdfplumber extract_table() works reliably; header row repeats each page — data rows identified by EC- prefix in first column; no registrant data available; manufacturer, model, serial number, powerplant manufacturer, powerplant model, and Clase may contain embedded newlines (including mid-word, e.g. Clase's PLANEADOR/MOTOPLANEADOR wrapping as PLANEADOR/MOTOPL + newline + ANEADOR) — collapsed to single space before use; Nº serie value 'NO DISPONIBLE' (post-collapse) treated as null; Año cons. value 1900 is a placeholder for unknown year — omit manufactured_date; Clase column decoded to English aircraft type; no ICAO hex — resolved via RediSearch reverse-lookup against Mictronics records; must run after Mictronics; ICAO hex range: 340000–34FFFF"
    files:
      - name: aeronaves_inscritas.pdf
