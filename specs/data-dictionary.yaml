          manufacturer_model:
            type: string
            description: >
              Combined manufacturer + model string from Mictronics types
              (e.g. BOEING 757-200). If absent after the mictronics/registry
              merge, shared/lua/merge_aircraft.lua synthesizes it at read
              time from aircraft.manufacturer / aircraft.model — see the
              "Computed fallback fields" note near the top of this file. The
              computed value is never written back to Redis.
            persisted: true
            sources:
              - source: mictronics
                file: types.json
                field: "values[0]"
              - source: uk-caa
                endpoint: details
                field: "AircraftDetails.ICAOAircraftTypeDesignator"
                transform:
                  type: redis_lookup
                  lookup_key: "aircraft:type:{type_designator}"
                  lookup_field: manufacturer_model
                  description: "field above (ICAOAircraftTypeDesignator) supplies {type_designator} used to build lookup_key; lookup_field is the property read from that looked-up aircraft:type document (see records.aircraft_type) and copied as-is to this field. Unconditional — written regardless of whether mictronics also has a value for the same hex, since registry wins over mictronics on read via merge_aircraft.lua either way"
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: "ICAO-code"
                transform:
                  type: redis_lookup
                  lookup_key: "aircraft:type:{type_designator}"
                  lookup_field: manufacturer_model
                  description: "field above (ICAO-code) supplies {type_designator} used to build lookup_key; lookup_field is the property read from that looked-up aircraft:type document (see records.aircraft_type) and copied as-is to this field. Unconditional — written regardless of whether mictronics also has a value for the same hex, since registry wins over mictronics on read via merge_aircraft.lua either way"
              - source: au-casa
                file: acrftreg
                field: ICAOtypedesig
                transform:
                  type: redis_lookup
                  lookup_key: "aircraft:type:{type_designator}"
                  lookup_field: manufacturer_model
                  description: "field above (ICAOtypedesig) supplies {type_designator} used to build lookup_key; lookup_field is the property read from that looked-up aircraft:type document (see records.aircraft_type) and copied as-is to this field. Unconditional — written regardless of whether mictronics also has a value for the same hex, since registry wins over mictronics on read via merge_aircraft.lua either way"
              - source: ch-bazl
                endpoint: bulk
                field: "ICAO Aircraft Type"
                transform:
                  type: redis_lookup
                  lookup_key: "aircraft:type:{type_designator}"
                  lookup_field: manufacturer_model
                  description: "field above (ICAO Aircraft Type) supplies {type_designator} used to build lookup_key; lookup_field is the property read from that looked-up aircraft:type document (see records.aircraft_type) and copied as-is to this field. Unconditional — written regardless of whether mictronics also has a value for the same hex, since registry wins over mictronics on read via merge_aircraft.lua either way"
              - source: br-anac
                file: dados_aeronaves.json
                field: CDTIPOICAO
                transform:
                  type: redis_lookup
                  lookup_key: "aircraft:type:{type_designator}"
                  lookup_field: manufacturer_model
                  description: "field above (CDTIPOICAO) supplies {type_designator} used to build lookup_key; lookup_field is the property read from that looked-up aircraft:type document (see records.aircraft_type) and copied as-is to this field. Unconditional — written regardless of whether mictronics also has a value for the same hex, since registry wins over mictronics on read via merge_aircraft.lua either way"

