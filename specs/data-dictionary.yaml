    status: optional

  processor:
    description: "Derived in real time by the message processor from ADS-B messages"


# ── Record definitions ─────────────────────────────────────────────────────
# Each record type defines the fields for one Redis enrichment record or the
# completed flight S3 archive record. Sources and merge rules apply per-record.

records:

  flight:
    description: >
      Completed flight record. Written to S3 on flight completion and used as
      the authoritative archive document. Also defines the icao_hex:{hex} Redis
      enrichment shape written by data runners.
    storage: S3
    s3_path: "flights/{YYYY}/{MM}/{DD}/{icao_hex}_{ident}_{uuid}.json.gz"
    redis_key: "icao_hex:{icao_hex}"
    fields:

      _id:
        type: string
        description: "UUID-v7 unique flight identifier"
        persisted: true
        sources:
          - source: processor
            transform:
              type: generate
              function: uuid7

      first_message:
        type: datetime
        description: "UTC timestamp of the first ADS-B message in this flight"
        persisted: true
        sources:
          - source: processor

      last_message:
        type: datetime
        description: "UTC timestamp of the most recent ADS-B message"
        persisted: true
        sources:
          - source: processor

      total_messages:
        type: integer
        description: "Total count of ADS-B messages received for this flight"
        persisted: true
        sources:
          - source: processor

      icao_hex:
        type: string
        description: "6-character uppercase ICAO Mode S hex identifier (e.g. A8AE7F); primary key for Redis enrichment records"
        persisted: true
        sources:
          - source: processor
            description: "Present in every ADS-B message"
          - source: mictronics
            file: aircrafts.json
            description: "JSON object key; already a 6-character uppercase hex string"
          - source: us-faa
            file: master.txt
            field: MODE S CODE HEX
            position: 33
            transform:
              type: uppercase
              description: "Field is hex but may be mixed case — normalise to uppercase"
          - source: ca-tc
            file: carscurr.txt
            field: MODE_S_TRANSPONDER_BINARY
            position: 42
            transform:
              type: binary_to_hex
              description: "24-character binary string — format(int(value, 2), '06X') → 6-character uppercase hex"
          - source: nz-caa
            file: Aircraft-Register-for-website-.csv
            field: Mode S Code HEX
            transform:
              type: uppercase
              description: "Field is already 6-character hex — normalise to uppercase and strip whitespace"
          - source: no-caa
            file: norgesluftfartoyregister.json
            field: "ICAO 24-bits adresse[].Heksadesimal"
            transform:
              type: uppercase
              description: "Extract Heksadesimal entry from the ICAO address array; normalise to uppercase"
          - source: nl-ilt
            file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
            field: X-Ponder
            transform:
              type: uppercase
              description: "6-character hex string; normalise to uppercase and strip whitespace"
          - source: au-casa
            file: acrftreg
            description: "CASA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{VH\\-XXX} against Mictronics records; enriches existing records only"
          - source: fr-dgac
            file: export.csv
            description: "DGAC does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{F\\-XXX} against Mictronics records; enriches existing records only"
          - source: bs-caa
            file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
            description: "Bahamas CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{C6\\-XXX} against Mictronics records; enriches existing records only"
          - source: ky-caa
            file: Active-Aircraft-Register.pdf
            description: "Cayman Islands CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{VP\\-CXXX} against Mictronics records; enriches existing records only"
          - source: br-anac
            file: dados_aeronaves.json
            description: "ANAC does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:simple @registration:{PP\\-XXX} against Mictronics records; enriches existing records only"
          - source: uk-caa
            endpoint: details
            field: AircraftDetails.ICAO24BitAircraftAddress.Hex
            transform:
              type: uppercase
              description: "Hex string normalised to uppercase"
          - source: ch-bazl
            endpoint: bulk
            field: " Aircraft Address HEX"
            transform:
              type: uppercase
              description: "6-character hex string normalised to uppercase"

      registration:
        type: string
        description: "Aircraft registration mark (e.g. N659DL, C-FEGI)"
        persisted: true
        sources:
          - source: us-faa
            file: master.txt
            field: N-NUMBER
            position: 0
            transform:
              type: prefix
              value: "N"
              description: "Prepend 'N' to the stored number to form the full mark"
          - source: ca-tc
            file: carscurr.txt
            field: TRIMMED_MARK
            position: 46
            transform:
              type: prefix
              value: "C-"
              description: "Prepend 'C-' to the stored mark to form the full registration"
          - source: mictronics
            file: aircrafts.json
            field: "values[0]"
          - source: nz-caa
            file: Aircraft-Register-for-website-.csv
            field: Registration Mark
            description: "Full registration mark including ZK- prefix (e.g. ZK-AAC)"
          - source: no-caa
            file: norgesluftfartoyregister.json
            field: Registreringsmerke
            description: "Full registration mark including LN- prefix (e.g. LN-ABA)"
          - source: au-casa
            file: acrftreg
            field: Mark
            transform:
              type: prefix
              value: "VH-"
              description: "Prepend 'VH-' to the 3-character mark suffix to form the full registration"
          - source: nl-ilt
            file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
            field: Registration
            description: "Full registration mark including PH- prefix (e.g. PH-ABC)"
          - source: fr-dgac
            file: export.csv
            field: IMMATRICULATION
            description: "Full registration mark including F- prefix (e.g. F-BKDK)"
          - source: bs-caa
            file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
            field: AIRCRAFT REGISTRATION NUMBER
            description: "Full registration mark including C6- prefix (e.g. C6-BFY)"
          - source: ky-caa
            file: Active-Aircraft-Register.pdf
            field: "Aircraft Registration"
            description: "Full registration mark including VP-C prefix (e.g. VP-CAD)"
          - source: uk-caa
            endpoint: details
            field: RegistrationDetails.Mark
            transform:
              type: prefix
              value: "G-"
              description: "Prepend 'G-' to the stored mark to form the full registration"
          - source: ch-bazl
            endpoint: bulk
            field: " Registration"
            description: "Full registration mark including HB- prefix (e.g. HB-JNA)"
          - source: br-anac
            file: dados_aeronaves.json
            field: MARCA
            transform:
              type: insert_hyphen
              position: 2
              description: "MARCA stored without hyphen (e.g. PPAJH); hyphen inserted after position 2 to yield full registration (PP-AJH)"

      registrant:
        type: object
        description: "Owner/registrant information from the national civil aircraft registry"
        persisted: true
        properties:

          names:
            type: "array[string]"
            description: "Registrant name(s); primary name is first; additional DBA names follow"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                fields:
                  - { field: NAME,            position: 6  }
                  - { field: "OTHER NAMES(1)", position: 24 }
                  - { field: "OTHER NAMES(2)", position: 25 }
                  - { field: "OTHER NAMES(3)", position: 26 }
                  - { field: "OTHER NAMES(4)", position: 27 }
                  - { field: "OTHER NAMES(5)", position: 28 }
                transform:
                  type: collect_non_empty
                  description: "Collect all non-blank name fields in column order into an array"
              - source: ca-tc
                file: carsownr.txt
                fields:
                  - { field: FULL_NAME,   position: 1 }
                  - { field: TRADE_NAME,  position: 2 }
                transform:
                  type: collect_non_empty
                  description: "Collect FULL_NAME then TRADE_NAME; filter ACTIVE_FLAG='A' rows first"
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Name
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[].Navn"
                transform:
                  type: collect_ordered
                  description: "Eier/Kontakt entry first, then all Eier entries; deduplicated"
              - source: au-casa
                file: acrftreg
                field: regholdname
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list"
              - source: fr-dgac
                file: export.csv
                field: PROPRIETAIRE
                transform:
                  type: collect_ordered
                  description: "Rows are grouped by IMMATRICULATION (co-ownership); all unique non-blank PROPRIETAIRE values collected in order of first appearance; blank for individuals per GDPR"
              - source: bs-caa
                file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
                field: REGISTERED OWNER OF AIRCRAFT
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Registered Owner"
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list; embedded newlines normalised to spaces"
              - source: uk-caa
                endpoint: details
                fields:
                  - { field: "RegisteredAircraftOwners[0].RegisteredOwner" }
                  - { field: "RegisteredAircraftOwners[0].TradingAs" }
                transform:
                  type: collect_non_empty
                  description: "RegisteredOwner first; TradingAs appended if non-null"
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_name
                  description: "Best-effort parse of 'Name[, Canton]?, Street, PostalCode City, Switzerland'; 2-letter canton abbreviations filtered out; if only one non-canton segment remains after extracting the postal line it is the name (no street); wrapped in a one-element list"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_name
                  description: "Best-effort parse; line 0 of first owner group (\\r\\n-delimited); surrounding quotes stripped; wrapped in a one-element list"
              - source: br-anac
                file: dados_aeronaves.json
                field: "PROPRIETARIOSJSON[0].NOME"
                transform:
                  type: wrap_array
                  description: "NOME of first owner entry; /\\\"\\\" un-escaped to double-quote before JSON parse; 'Indisponível' treated as absent; wrapped in a one-element list"

          street:
            type: "array[string]"
            description: "Street address lines; blank lines omitted"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                fields:
                  - { field: STREET,  position: 7 }
                  - { field: STREET2, position: 8 }
                transform:
                  type: collect_non_empty
              - source: ca-tc
                file: carsownr.txt
                fields:
                  - { field: STREET_NAME,  position: 3 }
                  - { field: STREET_NAME2, position: 4 }
                transform:
                  type: collect_non_empty
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_street
                  description: "All comma-segments except the last two; PO Box segments treated as street lines"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Gateadresse"
                transform:
                  type: wrap_array
                  description: "Single street address line from the Eier/Kontakt owner entry"
              - source: au-casa
                file: acrftreg
                fields:
                  - { field: regholdadd1 }
                  - { field: regholdadd2 }
                transform:
                  type: collect_non_empty
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_street
                  description: "Everything before the 5-digit postal code; omitted if no postal code found (foreign addresses)"
              - source: uk-caa
                endpoint: details
                fields:
                  - { field: "RegisteredAircraftOwners[0].Address1" }
                  - { field: "RegisteredAircraftOwners[0].Address2" }
                transform:
                  type: collect_non_empty
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_street
                  description: "Best-effort parse; third-from-last comma-segment (before PostalCode City and Switzerland); wrapped in a one-element list"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_street
                  description: "Best-effort parse; everything after first comma on line 1 (PostalCode City, Street) of first owner group; wrapped in a one-element list"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Registered Address"
                transform:
                  type: split_comma
                  description: "Country suffix (matching Nationality column) stripped first; remaining string split on commas, each segment trimmed and stored as a separate street line"

          city:
            type: string
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: CITY
                position: 9
              - source: ca-tc
                file: carsownr.txt
                field: CITY
                position: 5
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_city
                  description: "Second-to-last comma-segment; extract leading word(s) before trailing 3–6 digit postal code; omitted if segment is a PO Box"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Poststed"
              - source: au-casa
                file: acrftreg
                field: regholdSuburb
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_city
                  description: "Everything after the 5-digit postal code (before country); omitted if no postal code found"
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].Town"
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_city
                  description: "Best-effort parse; city portion of second-to-last comma-segment (after 4-digit postal code)"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_city
                  description: "Best-effort parse; word(s) on line 1 of first owner group after the postal code digits and before the first comma"

          administrative_area:
            type: string
            description: "First-level country subdivision (US state, Canadian province, etc.)"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: STATE
                position: 10
              - source: ca-tc
                file: carsownr.txt
                field: PROVINCE_OR_STATE_E
                position: 6
              - source: au-casa
                file: acrftreg
                field: regholdState
                description: "Australian state/territory abbreviation (NSW, VIC, QLD, SA, WA, TAS, NT, ACT); passed through as-is"
                # fr-dgac has no administrative_area equivalent
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].County"

          postal_code:
            type: string
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: ZIP CODE
                position: 11
              - source: ca-tc
                file: carsownr.txt
                field: POSTAL_CODE
                position: 8
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_postal
                  description: "Trailing 3–6 digit number from second-to-last comma-segment; omitted if segment is a PO Box"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Postnummer"
              - source: au-casa
                file: acrftreg
                field: regholdPostcode
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_postal
                  description: "5-digit postal code extracted from free-text address; omitted if no 5-digit code found"
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].PostCode"
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_postal
                  description: "Best-effort parse; leading 4-digit postal code from second-to-last comma-segment"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_postal
                  description: "Best-effort parse; leading digit sequence before first space on line 1 of first owner group"

          country:
            type: string
            description: "ISO 3166-1 alpha-2 country code"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: COUNTRY
                position: 14
                transform:
                  type: fallback_constant
                  value: "US"
                  description: "Use field value if non-empty; fall back to 'US' for domestic records"
              - source: ca-tc
                file: carsownr.txt
                field: COUNTRY_E
                position: 9
                transform:
                  type: decode_country_name
                  description: "Full English country name (e.g. 'CANADA') → ISO 3166-1 alpha-2 code"
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_country
                  description: "Last comma-segment; mapped to ISO 3166-1 alpha-2 (e.g. 'New Zealand' → 'NZ'); falls back to raw name if unmapped"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Land"
                transform:
                  type: decode_country_name
                  description: "Norwegian names (Norge→NO, Sverige→SE, Danmark→DK) and English names mapped to ISO 3166-1 alpha-2; falls back to raw name if unmapped"
              - source: au-casa
                file: acrftreg
                field: regholdCountry
                transform:
                  type: decode_country_name
                  description: "Full English country name mapped to ISO 3166-1 alpha-2 (e.g. 'Australia' → 'AU'); falls back to raw name if unmapped"
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_country
                  description: "French country name stripped from end of address string (multi-word names checked first); mapped to ISO 3166-1 alpha-2 (e.g. 'FRANCE'→FR, 'ETATS UNIS D\\'AMERIQUE'→US); omitted if country suffix not recognised"
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].Country"
                transform:
                  type: decode_country_name
                  description: "Full English country name mapped to ISO 3166-1 alpha-2 (e.g. 'UNITED KINGDOM' → 'GB'); falls back to raw name if unmapped"
              - source: ch-bazl
                endpoint: bulk
                description: "Always 'CH' — all BAZL-registered aircraft are Swiss-based"
                value: "CH"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: decode_country_name
                  description: "German country name on line 2 of first owner group (e.g. 'Österreich'→AT, 'Deutschland'→DE, 'Tschechische Republik'→CZ); falls back to raw name if unmapped"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Nationality"
                transform:
                  type: decode_country_name
                  description: "Full English country name mapped to ISO 3166-1 alpha-2 (e.g. 'United Kingdom'→GB, 'Cayman Islands'→KY); 'Irish' normalised to IE; case-insensitive ('Cayman islands' typo handled); omitted if unmapped"

          type:
            type: string
            description: "Registrant category"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: TYPE REGISTRANT
                position: 5
                transform:
                  type: decode_table
                  values:
                    "1": Individual
                    "2": Partnership
                    "3": Corporation
                    "4": Co-Owned
                    "5": Government
                    "7": LLC
                    "8": "Non-Citizen Corporation"
                    "9": "Non-Citizen Co-Owned"
              - source: ca-tc
                file: carsownr.txt
                field: TYPE_OF_OWNER_E
                position: 11
                transform:
                  type: decode_table
                  values:
                    "Individual": Individual
                    "Entity": Corporation
                    "Manufacturer": Corporation

      aircraft:
        type: object
        description: "Aircraft type and physical specification data"
        persisted: true
        properties:

          type:
            type: string
            description: "Aircraft category (Airplane, Rotorcraft, Glider, etc.)"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: TYPE-ACFT
                position: 3
                transform:
                  type: decode_table
                  values:
                    "1": Glider
                    "2": Balloon
                    "3": "Blimp/Dirigible"
                    "4": Airplane
                    "5": Airplane
                    "6": Rotorcraft
                    "7": Weight-Shift-Control
                    "8": Powered Parachute
                    "9": Gyroplane
              - source: ca-tc
                file: carscurr.txt
                field: AIRCRAFT_CATEGORY_E
                position: 10
                transform:
                  type: decode_table
                  values:
                    "Aeroplane": Airplane
                    "Helicopter": Helicopter
                    "Glider": Glider
                    "Balloon": Balloon
                    "Gyroplane": Gyroplane
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Kategori
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Fly": Airplane
                    "Helikopter": Helicopter
                    "Seilfly": Glider
                    "Ballong": Balloon
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Model Category
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Aeroplane (Aircraft)": Airplane
                    "Amateur Built Aeroplane": Airplane
                    "Helicopter": Helicopter
                    "Amateur Built Helicopter": Helicopter
                    "Microlight Class 1": Microlight
                    "Microlight Class 2": Microlight
                    "Glider": Glider
                    "Power Glider": Glider
                    "Amateur Built Glider": Glider
                    "Gyroplane (Gyrocopter)": Gyroplane
                    "Balloon (hot-air)": Balloon
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Group
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Small aeroplane": Airplane
                    "Large aeroplane": Airplane
                    "Sailplane": Glider
                    "Glider": Glider
                    "MLA, MLH": Microlight
                    "Micro light aeroplane": Microlight
                    "Balloon": Balloon
                    "Rotorcraft": Helicopter
                    "Drones": Drone
              - source: au-casa
                file: acrftreg
                field: Airframe
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Power Driven Aeroplane": Airplane
                    "Rotorcraft": Helicopter
                    "Glider": Glider
                    "Manned Free Balloon": Balloon
                    "Motor-Glider": Glider
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.AircraftClass
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "FIXED-WING LANDPLANE": Airplane
                    "FIXED-WING SEAPLANE": Airplane
                    "FIXED-WING AMPHIBIAN": Airplane
                    "ROTORCRAFT": Helicopter
                    "GLIDER": Glider
                    "POWERED GLIDER": Glider
                    "MOTOR GLIDER": Glider
                    "FREE BALLOON": Balloon
                    "AIRSHIP": Airship
                    "MICROLIGHT AEROPLANE": Microlight
                    "GYROPLANE": Gyroplane
                    "POWERED LIFT": "Powered Lift"
                    "TILT ROTOR": "Powered Lift"
              - source: ch-bazl
                endpoint: bulk
                field: " Aircraft Type"
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Aeroplane": Airplane
                    "Homebuilt Airplane": Airplane
                    "Helicopter": Helicopter
                    "Homebuilt Helicopter": Helicopter
                    "Glider": Glider
                    "Powered Glider": Glider
                    "Homebuild Glider": Glider
                    "Balloon (Hot-air)": Balloon
                    "Balloon (Gas)": Balloon
                    "Airship (Hot-air)": Airship
                    "Ultralight Gyrocopter": Gyroplane
                    "Homebuilt Gyrocopter": Gyroplane
                    "Ultralight (3-axis control)": Microlight
                    "Ecolight": Microlight
                    "Trike": Weight-Shift-Control
              - source: at-austrocontrol
                endpoint: bulk
                field: luftfahrzeugart
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Flugzeug": Airplane
                    "Hubschrauber": Helicopter
                    "Tragschrauber": Gyroplane
                    "Eigenstartfähiger Motorsegler": Glider
                    "Nicht eigenstartfähiger Motorsegler": Glider
              - source: br-anac
                file: dados_aeronaves.json
                field: CDCLS
                transform:
                  type: decode_table
                  description: "Position 1 (index 0) of CDCLS; special value 'RPA' maps to Drone"
                  values:
                    "L": Airplane
                    "H": Helicopter
                    "A": Amphibian
                    "G": Gyroplane
                    "S": Seaplane
                    "RPA": Drone

          model:
            type: string
            description: "Model designation from the national registry (e.g. 757-232)"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: MODEL
                position: 2
              - source: ca-tc
                file: carscurr.txt
                field: MODEL_NAME
                position: 4
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Model
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Type
              - source: au-casa
                file: acrftreg
                field: Model
                notes: "Type column is always blank; Model column used instead"
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Model
              - source: fr-dgac
                file: export.csv
                field: MODELE
              - source: bs-caa
                file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
                field: "AIRCRAFT TYPE - MAKE/MODEL"
                description: "Combined make and model free-text field (e.g. 'B737-790', 'CIRRUS SR 22', 'DE HAVILLAND DHC-6'); no separate manufacturer column; stored as-is"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Series Type"
                description: "Combined manufacturer and model free-text field (e.g. 'Gulfstream Aerospace Corporation G-IV', 'Leonardo S.p.A. AW139'); no separate manufacturer column; embedded newlines normalised to spaces; stored as-is"
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.Type
              - source: ch-bazl
                endpoint: bulk
                field: " Aicraft Model"
                description: "Model designation as published (note: 'Aicraft' is a typo in the source field name)"
              - source: at-austrocontrol
                endpoint: bulk
                field: baumuster
              - source: br-anac
                file: dados_aeronaves.json
                field: DSMODELO

          seats:
            type: integer
            description: "Number of seats certified"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: NO-SEATS
                position: 8
              - source: ca-tc
                file: carscurr.txt
                field: NUMBER_OF_SEATS
                position: 18
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.MaximumPassengers
                transform:
                  type: add
                  value: 1
                  description: "MaximumPassengers counts passengers only (excludes pilot); +1 gives total seats. Accuracy for multi-crew transport category aircraft is unknown."
              - source: ch-bazl
                endpoint: bulk
                transform:
                  type: sum
                  fields:
                    - field: " MOPSC"
                      description: "Maximum Operational Passenger Seating Configuration"
                    - field: " Minimum Crew"
                      description: "Minimum required flight crew"
              - source: br-anac
                file: dados_aeronaves.json
                field: NRASSENTOS

          category:
            type: string
            description: "Aircraft build category (Land, Sea, Amphibian)"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: CLASS
                position: 5
                transform:
                  type: decode_table
                  values:
                    "1": Land
                    "2": Sea
                    "3": Amphibian

          manufacturer:
            type: string
            description: "Aircraft manufacturer name"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: MFG
                position: 1
              - source: ca-tc
                file: carscurr.txt
                field: ID_PLATE_MANUFACTURERS_NAME
                position: 7
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Manufacturer
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Produsent
              - source: au-casa
                file: acrftreg
                field: Manu
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Manufacturer
              - source: fr-dgac
                file: export.csv
                field: CONSTRUCTEUR
              - source: mictronics
                file: types.json
                field: "values[0]"
                transform:
                  type: split_first
                  delimiter: " "
                  description: "Split 'Boeing 737-800' on first space; keep left part"
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.Manufacturer
              - source: ch-bazl
                endpoint: bulk
                field: " Manufacturer"
              - source: at-austrocontrol
                endpoint: bulk
                field: hersteller
              - source: br-anac
                file: dados_aeronaves.json
                field: NMFABRICANTE

          type_designator:
            type: string
            description: "ICAO 4-character aircraft type designator (e.g. B752)"
            persisted: true
            sources:
              - source: mictronics
                file: aircrafts.json
                field: "values[1]"
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: ICAO-code
                description: "ICAO 4-character type designator (e.g. B738, TL30)"
              - source: au-casa
                file: acrftreg
                field: ICAOtypedesig
                description: "ICAO 4-character type designator; populated for all CASA records"
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.ICAOAircraftTypeDesignator
              - source: ch-bazl
                endpoint: bulk
                field: " ICAO Aircraft Type"
              - source: br-anac
                file: dados_aeronaves.json
                field: CDTIPOICAO

          manufacturer_model:
            type: string
            description: "Combined manufacturer + model string from Mictronics types (e.g. BOEING 757-200)"
            persisted: true
            sources:
              - source: mictronics
                file: types.json
                field: "values[0]"

          serial_number:
            type: string
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: SERIAL NUMBER
                position: 1
              - source: ca-tc
                file: carscurr.txt
                field: MANUFACTURERS_SERIAL_NUMBER
                position: 5
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Serial No.
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Serienummer
              - source: au-casa
                file: acrftreg
                field: Serial
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Serial
              - source: fr-dgac
                file: export.csv
                field: NUMERO_SERIE
              - source: bs-caa
                file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
                field: "SERIAL #"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Serial Number"
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.SerialNumber
              - source: ch-bazl
                endpoint: bulk
                field: " Serial Number"
              - source: at-austrocontrol
                endpoint: bulk
                field: seriennummer
              - source: br-anac
                file: dados_aeronaves.json
                field: NRSERIE

          manufactured_date:
            type: datetime
            description: "Date of manufacture as ISO 8601 UTC datetime; FAA is year-only precision (January 1 assumed); TC is nominally full date but 99.8% of records are also January 1"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: YEAR MFR
                position: 4
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "FAA provides 4-digit year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: ca-tc
                file: carscurr.txt
                field: DATE_MANUFACTURE_ASSEMBLY
                position: 31
                precision: date
                transform:
                  type: format_string
                  pattern: "{value.replace('/', '-')}T00:00:00Z"
                  description: "TC provides YYYY/MM/DD — reformat separators and append UTC time"
                  skip_if_empty: true
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Byggeår
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "Norway provides 4-digit build year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Built
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "ILT provides 4-digit build year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: au-casa
                file: acrftreg
                field: Yearmanu
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "CASA provides 4-digit manufacture year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.YearBuild
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "UK CAA provides 4-digit build year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: ch-bazl
                endpoint: bulk
                field: " Year of Manufacture"
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "BAZL provides 4-digit manufacture year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: br-anac
                file: dados_aeronaves.json
                field: NRANOFABRICACAO
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "ANAC provides 4-digit manufacture year only; null for some records — January 1 at midnight UTC assumed"
                  skip_if_empty: true

          wake_turbulence_category:
            type: string
            description: "ICAO wake turbulence category (Light, Medium, Heavy, Super)"
            persisted: true
            sources:
              - source: mictronics
                file: types.json
                field: "values[2]"
                transform:
                  type: decode_table
                  values:
                    "J": Super
                    "H": Heavy
                    "M": Medium
                    "L": Light
                    "M/L": "Medium/Light"
                    "-": "Unknown/None"

      powerplant:
        type: object
        description: "Engine and powerplant specification data"
        persisted: true
        properties:

          count:
            type: integer
            description: "Number of engines installed"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: NO-ENG
                position: 7
              - source: ca-tc
                file: carscurr.txt
                field: NUMBER_OF_ENGINES
                position: 17
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Engines
              - source: au-casa
                file: acrftreg
                field: engnum
              - source: uk-caa
                endpoint: details
                field: "AircraftDetails.Engines[0].TotalNumberOfEngines"
              - source: br-anac
                file: dados_aeronaves.json
                field: CDCLS
                transform:
                  type: decode_character
                  position: 1
                  description: "Position 2 (index 1) of CDCLS is the engine count digit; '0' or absent = omit; omitted for RPA (drone) records"

          type:
            type: string
            description: "Engine type (Reciprocating, Turbo-fan, etc.)"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: TYPE-ENG
                position: 4
                transform:
                  type: decode_table
                  values:
                    "0": None
                    "1": Piston
                    "2": Turbo-prop
                    "3": Turbo-shaft
                    "4": Turbo-jet
                    "5": Turbo-fan
                    "6": Ramjet
                    "7": 2 Cycle
                    "8": 4 Cycle
                    "9": Unknown
                    "10": Electric
                    "11": Rotary
              - source: ca-tc
                file: carscurr.txt
                field: ENGINE_CATEGORY_E
                position: 15
                transform:
                  type: decode_table
                  values:
                    "Piston": Piston
                    "Turbo Fan": Turbo-fan
                    "Turbo Prop": Turbo-prop
                    "Turbo Shaft": Turbo-shaft
                    "Turbo Jet": Turbo-jet
                    "Electric": Electric
                    "Other": Unknown
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: EngKind
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; 'Engine - not defined' and blank → omit; unknown values pass through unmodified"
                  values:
                    "Reciprocating piston-driven engine": Piston
                    "Reciprocating piston radial engine": Piston
                    "Piston-driven shaft (rotorcraft) engine": Piston
                    "Reciprocating piston-driven Diesel engine": Diesel
                    "Electrical engine": Electric
                    "Turbofan engine": Turbo-fan
                    "Turbine-driven shaft (rotorcraft) engine": Turbo-shaft
                    "Turbine-driven propeller engine": Turbo-prop
                    "Turbojet engine": Turbo-jet
                    "Wankel engine": Rotary
                    "Engine - not defined": ~~omit~~
              - source: au-casa
                file: acrftreg
                field: Engtype
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; 'Not Applicable' → omit; unknown values pass through unmodified"
                  values:
                    "Piston": Piston
                    "Turbofan": Turbo-fan
                    "Turboprop": Turbo-prop
                    "Turboshaft": Turbo-shaft
                    "Turbojet": Turbo-jet
                    "Electric": Electric
                    "Diesel Engine": Diesel
                    "Rotary": Rotary
                    "Not Applicable": ~~omit~~
              - source: ch-bazl
                endpoint: bulk
                field: " Engine Category"
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; comma-separated multi-engine entries take first value; unknown values pass through unmodified"
                  values:
                    "Piston Engine": Piston
                    "Turboshaft Engine": Turbo-shaft
                    "Turboprop Engine": Turbo-prop
                    "Jet Engine": Turbo-jet
                    "Electrical Engine": Electric
                    "Hydrogen-Electric": Hydrogen-Electric
              - source: br-anac
                file: dados_aeronaves.json
                field: CDCLS
                transform:
                  type: decode_character
                  position: 2
                  description: "Position 3 (index 2) of CDCLS is the propulsion code; T is context-sensitive: Turbo-shaft when CDCLS[0]='H' (helicopter), otherwise Turbo-prop; omitted for RPA (drone) records or when position is '0' or absent"
                  values:
                    "P": Piston
                    "J": Turbo-jet
                    "E": Electric
                    "T": "Turbo-prop (or Turbo-shaft for helicopters — see description)"

          model:
            type: string
            description: "Engine model designation (e.g. LEAP-1B28)"
            persisted: true
            sources:
              - source: us-faa
                file: engine.txt
                field: MODEL
                position: 2
                join: "master.txt[3] → engine.txt[0]"
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: EngModel
                notes: "Values containing 'not further defined' are omitted"
              - source: au-casa
                file: acrftreg
                field: Engmodel
              - source: uk-caa
                endpoint: details
                field: "AircraftDetails.Engines[0].Name"
              - source: ch-bazl
                endpoint: bulk
                field: " Engine"
                transform:
                  type: split_first
                  delimiter: ", "
                  description: "Comma-separated multi-engine entries take first value (e.g. 'CFM56-5B4/3, CFM56-5B4/P' → 'CFM56-5B4/3')"

          manufacturer:
            type: string
            description: "Engine manufacturer name"
            persisted: true
            sources:
              - source: us-faa
                file: engine.txt
                field: MFR
                position: 1
                join: "master.txt[3] → engine.txt[0]"
              - source: ca-tc
                file: carscurr.txt
                field: ENGINE_MANUF_E
                position: 13
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: EngManufacturer
                notes: "Values of 'Unknown' are omitted"
              - source: au-casa
                file: acrftreg
                field: Engmanu
              - source: ch-bazl
                endpoint: bulk
                field: " Engine manufacturer"

          power_type:
            type: string
            description: "Power rating unit — Horsepower (piston/turbo-prop) or Thrust (jet)"
            persisted: true
            sources:
              - source: us-faa
                file: engine.txt
                description: "Derived from engine TYPE; piston/prop → Horsepower; jet → Thrust"

          power_value:
            type: integer
            description: "Rated power output in horsepower or pounds of thrust"
            persisted: true
            sources:
              - source: us-faa
                file: engine.txt
                description: "HORSEPOWER or THRUST column depending on engine type"

      military:
        type: boolean
        description: "True if the aircraft is known to be military"
        persisted: true
        sources:
          - source: mictronics
            file: aircrafts.json
            field: "values[2]"
            transform:
              type: string_index_equals
              index: 0
              equals: "1"
              description: "flags_string[0] == '1'"

      ident:
        type: string
        description: "Callsign/flight number broadcast by the aircraft (e.g. DAL2)"
        persisted: true
        sources:
          - source: processor
            description: "DF 17 TC 1-4 ident message"

      operator:
        type: object
        description: "Airline operator enrichment from Mictronics; keyed by airline_designator"
        persisted: true
        properties:
          airline_designator:
            type: string
            description: "3-character ICAO airline code (e.g. DAL)"
            sources:
              - source: mictronics
                file: operators.json
                field: "key (airline_designator)"
          name:
            type: string
            description: "Full airline name (e.g. Delta Air Lines)"
            sources:
              - source: mictronics
                file: operators.json
                field: "values[0]"
          country:
            type: string
            sources:
              - source: mictronics
                file: operators.json
                field: "values[1]"
          callsign:
            type: string
            description: "RTF callsign (e.g. DELTA)"
            sources:
              - source: mictronics
                file: operators.json
                field: "values[2]"

      squawk:
        type: string
        description: "4-digit Mode A transponder squawk code (e.g. 7314)"
        persisted: true
        sources:
          - source: processor
            description: "DF 5/21 squawk message"

      origin:
        type: object
        description: "Departure airport enrichment; full object during processing; ICAO code string on persist"
        persisted: true
        persist_as:
          type: string
          from_field: icao_code
          description: "Only the ICAO code string (e.g. 'KMLB') is written to the S3 record"
        properties:
          icao_code:
            type: string
            description: "ICAO 4-character airport code"
            sources:
              - source: flightaware
              - source: standing-data
                file: routes
          iata_code:
            type: string
            description: "IATA 3-character airport code"
            sources:
              - source: ourairports
                file: airports.csv
                field: iata_code
          name:
            type: string
            sources:
              - source: ourairports
                file: airports.csv
                field: name
          city:
            type: string
            sources:
              - source: ourairports
                file: airports.csv
                field: municipality
          administrative_area:
            type: string
            description: "ISO 3166-2 subdivision code (e.g. US-FL)"
            sources:
              - source: ourairports
                file: airports.csv
                field: iso_region
          country:
            type: string
            description: "ISO 3166-1 alpha-2 country code"
            sources:
              - source: ourairports
                file: airports.csv
                field: iso_country
          phonic:
            type: string
            description: "Spoken/phonetic airport name for TTS notifications"
            sources:
              - source: ourairports
                file: airports.csv
                description: "Computed algorithmically from name + municipality; overridable via phonic_overrides.json"

      destination:
        type: object
        description: "Arrival airport enrichment; full object during processing; ICAO code string on persist"
        persisted: true
        persist_as:
          type: string
          from_field: icao_code
          description: "Only the ICAO code string (e.g. 'KATL') is written to the S3 record"
        properties:
          icao_code:
            type: string
            description: "ICAO 4-character airport code"
            sources:
              - source: flightaware
              - source: standing-data
                file: routes
          iata_code:
            type: string
            description: "IATA 3-character airport code"
            sources:
              - source: ourairports
                file: airports.csv
                field: iata_code
          name:
            type: string
            sources:
              - source: ourairports
                file: airports.csv
                field: name
          city:
            type: string
            sources:
              - source: ourairports
                file: airports.csv
                field: municipality
          administrative_area:
            type: string
            description: "ISO 3166-2 subdivision code (e.g. US-GA)"
            sources:
              - source: ourairports
                file: airports.csv
                field: iso_region
          country:
            type: string
            description: "ISO 3166-1 alpha-2 country code"
            sources:
              - source: ourairports
                file: airports.csv
                field: iso_country
          phonic:
            type: string
            description: "Spoken/phonetic airport name for TTS notifications"
            sources:
              - source: ourairports
                file: airports.csv
                description: "Computed algorithmically from name + municipality; overridable via phonic_overrides.json"

      matched_rules:
        type: "array[string]"
        description: "Rule name identifiers that fired for this flight"
        persisted: true
        sources:
          - source: processor

      positions:
        type: "array[object]"
        description: "Time-ordered position reports"
        persisted: true
        properties:
          timestamp:
            type: datetime
            description: "UTC timestamp of the position report"
            sources:
              - source: processor
          latitude:
            type: float
            sources:
              - source: processor
          longitude:
            type: float
            sources:
              - source: processor
          altitude:
            type: integer
            description: "Altitude in feet MSL; null if not present in the ADS-B message"
            sources:
              - source: processor

      velocities:
        type: "array[object]"
        description: "Time-ordered velocity reports"
        persisted: true
        properties:
          timestamp:
            type: datetime
            description: "UTC timestamp of the velocity report"
            sources:
              - source: processor
          velocity:
            type: float
            description: "Ground speed in knots"
            sources:
              - source: processor
          heading:
            type: float
            description: "True heading in degrees (0–359)"
            sources:
              - source: processor
          vertical_speed:
            type: integer
            description: "Vertical speed in feet per minute; negative = descending"
            sources:
              - source: processor

