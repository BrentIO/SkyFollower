        type: string
        description: "Callsign/flight number broadcast by the aircraft (e.g. DAL2)"
        persisted: true
        sources:
          - source: processor
            description: "DF 17 TC 1-4 ident message"

      operator:
        type: object
        description: "Airline operator enrichment from Mictronics; keyed by airline_designator"
        persisted: true
        properties:
          airline_designator:
            type: string
            description: "3-character ICAO airline code (e.g. DAL)"
