    notes: "Static PDF URL (does not change with updates); ~211 rows across 10 pages; no ICAO hex column — icao_hex resolved via RediSearch reverse-lookup by VP-C registration against Mictronics records; must run after Mictronics; 'Series Type' column combines manufacturer and model in a single field (stored as aircraft.model); no type designator or powerplant data available; 'Nationality' column is a clean English country name that always matches the country suffix of 'Registered Address' — used for registrant.country and to strip the suffix from the stored street; column headers contain embedded newlines — normalised by collapsing to single space; 'Cayman islands' (lowercase i) typo appears in actual PDF data and is normalised during ISO code lookup"
    files:
      - name: "Active-Aircraft-Register.pdf"
        format: pdf
        columns:
          "Aircraft Registration": Full VP-C-prefix registration mark
          "Registered Owner":      Registered owner name
          "Registered Address":    International free-text address; country name appears as a suffix matching the Nationality column
          "Nationality":           Clean English country name (e.g. 'United Kingdom', 'Cayman Islands')
          "Series Type":           Combined manufacturer and model designation (single free-text field)
          "Serial Number":         Manufacturer serial number

  uk-caa:
    description: "UK Civil Aviation Authority G-INFO aircraft register — G-prefix registrations"
    url: "https://ginfoapi.caa.co.uk"
    format: api
    cadence: weekly_tuesday
    notes: "Undocumented public REST API; no auth required; User-Agent 'P5Software SkyFollower' required; enumerates all G-registered aircraft by iterating every 2-letter suffix combination AA-ZZ (676 POST /api/aircraft/search calls); filters results on RegistrationStatus 'R'; calls GET /api/aircraft/details/{AircraftID} for each matched result; no hard Redis dependency — runs independently of Mictronics and completes successfully even if aircraft:type:{designator} lookups are unavailable, but opportunistically looks up its own ICAOAircraftTypeDesignator against that mictronics-populated reference table to set aircraft.manufacturer_model and aircraft.wake_turbulence_category when found (independently — a type entry with only one of the two still sets that one); details payload also includes AircraftOperatedByAocHolder (commercial operator, can differ from owner) — intentionally not captured, only RegisteredAircraftOwners is tracked"
    endpoints:
      search:
        method: POST
        path: /api/aircraft/search
        body_field: Registration
        description: "Search by registration mark suffix (Mark field without leading G-); returns array of {AircraftID, Mark, RegistrationStatus}"
      details:
        method: GET
        path: "/api/aircraft/details/{AircraftID}"
        description: "Full aircraft record including ICAO24BitAircraftAddress, Mark, Manufacturer, Type, ICAOAircraftTypeDesignator, AircraftClass, YearBuild, Engines[], and RegisteredAircraftOwners[]"

  ourairports:
    description: "OurAirports global airport database — airport:{icao_code} Redis keys"
    url: "https://davidmegginson.github.io/ourairports-data/airports.csv"
    format: csv
    cadence: weekly_monday
    notes: "Filtered to 4-character ICAO codes only (3-char and other-length idents dropped); stored as Redis JSON via JSON.SET in airport:{icao_code} keys; RediSearch index idx:airport on icao_code and iata_code TagFields; phonic name computed algorithmically from name + municipality fields with optional host-provided phonic_overrides.json override file; iata_code omitted if blank; latitude/longitude stored as floats"
    files:
      - name: airports.csv
        format: csv
        columns:
          ident:          4-character ICAO airport code (primary key; non-4-char rows dropped)
          iata_code:      IATA 3-character airport code (omitted from record if blank)
          name:           official airport name
          municipality:   city/municipality name (stored as city)
          iso_region:     ISO 3166-2 subdivision code (e.g. US-FL; stored as region)
          iso_country:    ISO 3166-1 alpha-2 country code
          latitude_deg:   decimal latitude (stored as latitude float)
          longitude_deg:  decimal longitude (stored as longitude float)

  airportwebcams:
    description: "Airport Webcams Special Liveries database — aircraft in retro/special/sponsor liveries; livery_name is spoken by Home Assistant TTS on a matched-flight notification, so it is derived/cleaned, not stored verbatim"
    url: "https://airportwebcams.net/special-liveries/"
    format: html
    cadence: weekly_friday
    notes: "TablePress table (id tablepress-8), fully server-rendered — all ~2,074 rows present in a single GET, no pagination/AJAX to crawl; default curl/requests User-Agent is blocked with HTTP 406 by the site's ModSecurity rule, an honest identifying User-Agent (e.g. 'Mozilla/5.0 (compatible; P5Software SkyFollower)') is accepted; robots.txt does not disallow this path for a generic user agent; no ICAO hex published — resolved via RediSearch against Mictronics records (FT.SEARCH idx:aircraft:mictronics), same pattern as at-austrocontrol/fr-dgac/etc.; must run after Mictronics; rows with Registration='Various' (whole-fleet liveries, e.g. Silk Way West '10 Years' sticker on the entire fleet) are skipped, not force-matched to a single hex"
    files:
      - name: "special-liveries/ (TablePress #tablepress-8)"
        format: html_table
        columns:
          0: Country
          1: Airline
          2: "Aircraft Type"
          3: Registration
          4: Description
        notes: "Registration cell text is the tail number (also a FlightRadar24 link). Description sometimes packs multiple livery names into one cell separated by ' / ' (~7% of rows), and/or carries a trailing '(sticker)'/'(stickers)' annotation and/or a trailing site-freshness marker like '(#New at 17-Jul-26)' — see the livery_name transform below; at least one real row's annotation itself contains a '/' ('(sticker; underside/belly)'), so annotations must be stripped before splitting on '/', not after"

  standing-data:
    description: "VRS Standing Data — operators, airports, and flight routes"
    url: "https://github.com/vradarserver/standing-data"
    format: csv
    cadence: weekly_tuesday

  flightaware:
    description: "FlightAware origin/destination enrichment (paid; optional)"
    format: api
    cadence: every_3_days
    status: optional

  processor:
    description: "Derived in real time by the message processor from ADS-B messages"


# ── Record definitions ─────────────────────────────────────────────────────
# Each record type defines the fields for one Redis enrichment record or the
# completed flight S3 archive record. Sources and merge rules apply per-record.

records:

  flight:
    description: >
      Completed flight record. Written to S3 on flight completion and used as
      the authoritative archive document. This record's aircraft.* field
      definitions are reused by reference for the two live Redis aircraft
      enrichment records, aircraft:mictronics:{icao_hex} (written by the
      mictronics runner) and aircraft:registry:{icao_hex} (written by every
      country registry runner) — see CLAUDE.md's Redis Key Schema. Those two
      keys are deep-merged at read time by shared/lua/merge_aircraft.lua,
      which is what a consumer actually queries for a single aircraft's
      merged enrichment; neither key nor the merged result is persisted under
      any icao_hex:{hex} key.
    storage: S3
    s3_path: "flights/{YYYY}/{MM}/{DD}/{icao_hex}_{ident}_{uuid}.json.gz"
    fields:

      _id:
        type: string
        description: "UUID-v7 unique flight identifier"
        persisted: true
        sources:
          - source: processor
            transform:
              type: generate
              function: uuid7

      first_message:
        type: datetime
        description: "UTC timestamp of the first ADS-B message in this flight"
        persisted: true
        sources:
          - source: processor

      last_message:
        type: datetime
        description: "UTC timestamp of the most recent ADS-B message"
        persisted: true
        sources:
          - source: processor

      total_messages:
        type: integer
        description: "Total count of ADS-B messages received for this flight"
        persisted: true
        sources:
          - source: processor

      icao_hex:
        type: string
        description: "6-character uppercase ICAO Mode S hex identifier (e.g. A8AE7F); primary key for Redis enrichment records"
        persisted: true
        sources:
          - source: processor
            description: "Present in every ADS-B message"
          - source: mictronics
            file: aircrafts.json
            description: "JSON object key; already a 6-character uppercase hex string"
          - source: us-faa
            file: master.txt
            field: MODE S CODE HEX
            position: 33
            transform:
              type: uppercase
              description: "Field is hex but may be mixed case — normalise to uppercase"
          - source: ca-tc
            file: carscurr.txt
            field: MODE_S_TRANSPONDER_BINARY
            position: 42
            transform:
              type: binary_to_hex
              description: "24-character binary string — format(int(value, 2), '06X') → 6-character uppercase hex"
          - source: nz-caa
            file: Aircraft-Register-for-website-.csv
            field: Mode S Code HEX
            transform:
              type: uppercase
              description: "Field is already 6-character hex — normalise to uppercase and strip whitespace"
          - source: no-caa
            file: norgesluftfartoyregister.json
            field: "ICAO 24-bits adresse[].Heksadesimal"
            transform:
              type: uppercase
              description: "Extract Heksadesimal entry from the ICAO address array; normalise to uppercase"
          - source: nl-ilt
            file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
            field: X-Ponder
            transform:
              type: uppercase
              description: "6-character hex string; normalise to uppercase and strip whitespace"
          - source: au-casa
            file: acrftreg
            description: "CASA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{VH\\-XXX} against Mictronics records; enriches existing records only"
          - source: fr-dgac
            file: export.csv
            description: "DGAC does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{F\\-XXX} against Mictronics records; enriches existing records only"
          - source: bs-caa
            file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
            description: "Bahamas CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{C6\\-XXX} against Mictronics records; enriches existing records only"
          - source: ky-caa
            file: Active-Aircraft-Register.pdf
            description: "Cayman Islands CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{VP\\-CXXX} against Mictronics records; enriches existing records only"
          - source: br-anac
            file: dados_aeronaves.json
            description: "ANAC does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{PP\\-XXX} against Mictronics records; enriches existing records only"
          - source: uk-caa
            endpoint: details
            field: AircraftDetails.ICAO24BitAircraftAddress.Hex
            transform:
              type: uppercase
              description: "Hex string normalised to uppercase"
          - source: ch-bazl
            endpoint: bulk
            field: " Aircraft Address HEX"
            transform:
              type: uppercase
              description: "6-character hex string normalised to uppercase"
          - source: im-ardis
            file: ARDIS search results (HTML table)
            field: "Mode S Number"
            transform:
              type: uppercase
              description: "6-character hex string normalised to uppercase; ICAO hex provided directly — no RediSearch lookup needed"
          - source: cz-caa
            endpoint: detail
            field: transponder
            transform:
              type: uppercase
              description: "6-character hex string normalised to uppercase"
          - source: me-caa
            page: detail
            description: "Montenegro CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{4O\\-XXX} against Mictronics records; enriches existing records only"
          - source: is-samgongustofa
            endpoint: bulk
            description: "Iceland Samgöngustofa does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{TF\\-XXX} against Mictronics records; enriches existing records only"
          - source: kr-koca
            file: statListEn01.do (JSON datatable)
            description: "Korea KOCA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{HL\\-XXXX} against Mictronics records; enriches existing records only"
          - source: hu-kozhaf
            file: "Aircraft register PDF (date-stamped, discovered via index page)"
            description: "Hungary KoZHAF does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{HA\\-XXX} against Mictronics records; enriches existing records only"
          - source: ge-gcaa
            description: "Georgia GCAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{4L\\-XXX} against Mictronics records; enriches existing records only"
          - source: gg-2reg
            file: "PDF (date-encoded, discovered via index page)"
            description: "Guernsey 2-reg does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{2\\-XXXX} against Mictronics records; enriches existing records only"
          - source: kg-caa
            description: "Kyrgyzstan CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{EX\\-XXX} against Mictronics records; enriches existing records only"
          - source: bg-caa
            file: "Aircraft_Register_{YYYYMMDD}.xlsx"
            description: "Bulgaria CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{LZ\\-XXX} against Mictronics records; enriches existing records only"
          - source: hr-ccaa
            file: "PDF (hash-based, discovered via index page)"
            description: "Croatia CCAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{9A\\-XXX} against Mictronics records; enriches existing records only"
          - source: cy-dca
            file: Aircraft_Register_Extract.pdf
            description: "Cyprus DCA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{5B\\-XXX} against Mictronics records; enriches existing records only"
          - source: ee-transpordiamet
            description: "Estonia Transpordiamet does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{ES\\-XXX} against Mictronics records; enriches existing records only"
          - source: lv-caa
            description: "Latvia CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{YL\\-XXX} against Mictronics records; enriches existing records only"
          - source: mv-caa
            file: "Aircraft register PDF (opaque hash filename; discovered via index page)"
            description: "Maldives CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{8Q\\-XXX} against Mictronics records; enriches existing records only"
          - source: md-caa
            file: Registrul_Aerian_al_Republicii_Moldova.pdf
            description: "Moldova CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{ER\\-XXX} against Mictronics records; enriches existing records only"
          - source: mk-caa
            file: "AIRCRAFT-REGISTER-DD.MM.YYYY.pdf (date-stamped, discovered via index page)"
            description: "North Macedonia CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{Z3\\-XXX} against Mictronics records; enriches existing records only"
          - source: pg-casapng
            file: "PNG-civil-aircraft-register-website{date}.pdf (date-stamped, discovered via index page)"
            description: "Papua New Guinea CASA PNG does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{P2\\-XXX} against Mictronics records; enriches existing records only"
          - source: rs-cad
            description: "Serbia CAD does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{YU\\-XXX} against Mictronics records; enriches existing records only"
          - source: sk-nsat
            file: WEB-DD.MM.YYYY.pdf (date-stamped, discovered via index page)
            description: "Slovakia NSAT does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{OM\\-XXX} against Mictronics records; enriches existing records only"
          - source: tc-caa
            file: aircraft-register (HTML page)
            description: "Turks & Caicos CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{VQ\\-XXX} against Mictronics records; enriches existing records only"
          - source: lu-dac
            file: "relev-aronefs-{DD}-{MM}-{YYYY}.pdf"
            description: "Luxembourg DAC does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{LX\\-XXX} against Mictronics records; enriches existing records only"
          - source: bz-bdca
            file: bdca-civil-aircraft-register (HTML page)
            description: "Belize BDCA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft:mictronics @registration:{V3\\-XXX} against Mictronics records; enriches existing records only"

      registration:
        type: string
        description: "Aircraft registration mark (e.g. N659DL, C-FEGI)"
        persisted: true
        sources:
          - source: us-faa
            file: master.txt
            field: N-NUMBER
            position: 0
            transform:
              type: prefix
              value: "N"
              description: "Prepend 'N' to the stored number to form the full mark"
          - source: ca-tc
            file: carscurr.txt
            field: TRIMMED_MARK
            position: 46
            transform:
              type: prefix
              value: "C-"
              description: "Prepend 'C-' to the stored mark to form the full registration"
          - source: mictronics
            file: aircrafts.json
            field: "values[0]"
          - source: nz-caa
            file: Aircraft-Register-for-website-.csv
            field: Registration Mark
            description: "Full registration mark including ZK- prefix (e.g. ZK-AAC)"
          - source: no-caa
            file: norgesluftfartoyregister.json
            field: Registreringsmerke
            description: "Full registration mark including LN- prefix (e.g. LN-ABA)"
          - source: au-casa
            file: acrftreg
            field: Mark
            transform:
              type: prefix
              value: "VH-"
              description: "Prepend 'VH-' to the 3-character mark suffix to form the full registration"
          - source: nl-ilt
            file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
            field: Registration
            description: "Full registration mark including PH- prefix (e.g. PH-ABC)"
          - source: fr-dgac
            file: export.csv
            field: IMMATRICULATION
            description: "Full registration mark including F- prefix (e.g. F-BKDK)"
          - source: bs-caa
            file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
            field: AIRCRAFT REGISTRATION NUMBER
            description: "Full registration mark including C6- prefix (e.g. C6-BFY)"
          - source: ky-caa
            file: Active-Aircraft-Register.pdf
            field: "Aircraft Registration"
            description: "Full registration mark including VP-C prefix (e.g. VP-CAD)"
          - source: uk-caa
            endpoint: details
            field: RegistrationDetails.Mark
            transform:
              type: prefix
              value: "G-"
              description: "Prepend 'G-' to the stored mark to form the full registration"
          - source: ch-bazl
            endpoint: bulk
            field: " Registration"
            description: "Full registration mark including HB- prefix (e.g. HB-JNA)"
          - source: br-anac
            file: dados_aeronaves.json
            field: MARCA
            transform:
              type: insert_hyphen
              position: 2
              description: "MARCA stored without hyphen (e.g. PPAJH); hyphen inserted after position 2 to yield full registration (PP-AJH)"
          - source: im-ardis
            file: ARDIS search results (HTML table)
            field: "Registration Mark"
            description: "Full M-prefix registration mark (e.g. M-ABCD)"
          - source: me-caa
            page: list
            field: "Registarska oznaka"
            description: "Full 4O-prefix registration mark (e.g. 4O-AOM)"
          - source: is-samgongustofa
            endpoint: bulk
            field: identifiers
            description: "Full TF-prefix registration mark (e.g. TF-ISA)"
          - source: kr-koca
            file: statListEn01.do (JSON datatable)
            field: REG_SNO
            description: "Full HL-prefix registration mark (e.g. HL-7612)"
          - source: hu-kozhaf
            file: "Aircraft register PDF (date-stamped, discovered via index page)"
            field: "0"
            description: "HA-prefix registration mark; stray space after hyphen (HA- GZQ) normalized to HA-GZQ"
          - source: ge-gcaa
            field: "2"
            description: "Full 4L-prefix registration mark (e.g. 4L-GAA)"
          - source: gg-2reg
            file: "PDF (date-encoded, discovered via index page)"
            field: "0"
            description: "Full 2-prefix registration mark (e.g. 2-ABCD)"
          - source: kg-caa
            field: "3"
            description: "Full EX-prefix registration mark (e.g. EX-001)"
          - source: bg-caa
            file: "Aircraft_Register_{YYYYMMDD}.xlsx"
            field: "Рег. знак (col 4)"
            description: "Full LZ-prefix registration mark (e.g. LZ-ABC)"
          - source: hr-ccaa
            file: "PDF (hash-based, discovered via index page)"
            field: "REG. OZNAKA"
            description: "Registration suffix with 9A- prepended (e.g. 9A-ABC)"
          - source: cy-dca
            file: Aircraft_Register_Extract.pdf
            field: "REGISTRATION MARK"
            description: "Full 5B-prefix registration mark (e.g. 5B-DBZ)"
          - source: ee-transpordiamet
            field: "1"
            description: "ES-prefix registration mark; internal whitespace normalized (e.g. 'ES - MBA' → 'ES-MBA')"
          - source: lv-caa
            field: Registration_Mark
            description: "Full YL-prefix registration mark (e.g. YL-LCS)"
          - source: mv-caa
            file: "Aircraft register PDF (opaque hash filename; discovered via index page)"
            field: "2"
            description: "Full 8Q-prefix registration mark (e.g. 8Q-MAD)"
          - source: md-caa
            file: Registrul_Aerian_al_Republicii_Moldova.pdf
            field: "2"
            description: "Full ER-prefix registration mark (e.g. ER-AXP)"
          - source: mk-caa
            file: "AIRCRAFT-REGISTER-DD.MM.YYYY.pdf (date-stamped, discovered via index page)"
            field: "2"
            description: "Full Z3-prefix registration mark (e.g. Z3-AAA)"
          - source: pg-casapng
            file: "PNG-civil-aircraft-register-website{date}.pdf (date-stamped, discovered via index page)"
            field: "0"
            description: "Full P2-prefix registration mark (e.g. P2-ANG)"
          - source: rs-cad
            field: registarska_oznaka
            description: "Full YU-prefix registration mark (e.g. YU-APA)"
          - source: sk-nsat
            file: WEB-DD.MM.YYYY.pdf (date-stamped, discovered via index page)
            field: "Poznávacia značka"
            description: "Spaced format 'OM - XXXX' normalized to 'OM-XXXX' by stripping whitespace around hyphen"
          - source: tc-caa
            file: aircraft-register (HTML page)
            field: REG
            description: "Full VQ-prefix registration mark (e.g. VQ-TCA)"
          - source: lu-dac
            file: "relev-aronefs-{DD}-{MM}-{YYYY}.pdf"
            field: Immat
            description: "Full LX-prefix registration mark (e.g. LX-AIR)"
          - source: bz-bdca
            file: bdca-civil-aircraft-register (HTML page)
            field: "Registration Number"
            description: "Full V3-prefix registration mark (e.g. V3-HBC)"

      registrant:
        type: object
        description: "Owner/registrant information from the national civil aircraft registry"
        persisted: true
        properties:

          names:
            type: "array[string]"
            description: "Registrant name(s); primary name is first; additional DBA names follow"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                fields:
                  - { field: NAME,            position: 6  }
                  - { field: "OTHER NAMES(1)", position: 24 }
                  - { field: "OTHER NAMES(2)", position: 25 }
                  - { field: "OTHER NAMES(3)", position: 26 }
                  - { field: "OTHER NAMES(4)", position: 27 }
                  - { field: "OTHER NAMES(5)", position: 28 }
                transform:
                  type: collect_non_empty
                  description: "Collect all non-blank name fields in column order into an array"
              - source: ca-tc
                file: carsownr.txt
                fields:
                  - { field: FULL_NAME,   position: 1 }
                  - { field: TRADE_NAME,  position: 2 }
                transform:
                  type: collect_non_empty
                  description: "Collect FULL_NAME then TRADE_NAME"
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Name
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[].Navn"
                transform:
                  type: collect_ordered
                  description: "Eier/Kontakt entry first, then all Eier entries; deduplicated"
              - source: au-casa
                file: acrftreg
                field: regholdname
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list"
              - source: fr-dgac
                file: export.csv
                field: PROPRIETAIRE
                transform:
                  type: collect_ordered
                  description: "Rows are grouped by IMMATRICULATION (co-ownership); all unique non-blank PROPRIETAIRE values collected in order of first appearance; blank for individuals per GDPR"
              - source: bs-caa
                file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
                field: REGISTERED OWNER OF AIRCRAFT
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Registered Owner"
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list; embedded newlines normalised to spaces"
              - source: uk-caa
                endpoint: details
                fields:
                  - { field: "RegisteredAircraftOwners[0].RegisteredOwner" }
                  - { field: "RegisteredAircraftOwners[0].TradingAs" }
                transform:
                  type: collect_non_empty
                  description: "RegisteredOwner first; TradingAs appended if non-null"
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_name
                  description: "Best-effort parse of 'Name[, Canton]?, Street, PostalCode City, Switzerland'; 2-letter canton abbreviations filtered out; if only one non-canton segment remains after extracting the postal line it is the name (no street); wrapped in a one-element list"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_name
                  description: "Best-effort parse; line 0 of first owner group (\\r\\n-delimited); surrounding quotes stripped; wrapped in a one-element list"
              - source: br-anac
                file: dados_aeronaves.json
                field: "PROPRIETARIOSJSON[0].NOME"
                transform:
                  type: wrap_array
                  description: "NOME of first owner entry; /\\\"\\\" un-escaped to double-quote before JSON parse; 'Indisponível' treated as absent; wrapped in a one-element list"
              - source: sg-caas
                file: Aircraft-Register-as-at-{MonYYYY}.xlsx
                field: Operator
                transform:
                  type: wrap_array
                  description: "Single operator name — wrap in a one-element list"
              - source: im-ardis
                file: ARDIS search results (HTML table)
                field: "Registered Owners"
                transform:
                  type: split_first_comma_name
                  description: "Everything before the first comma; wrapped in a one-element list"
              - source: cz-caa
                endpoint: detail
                field: "owners[*].display_name"
                transform:
                  type: collect_ordered
                  description: "All owner display_names collected in order"
              - source: me-caa
                page: detail
                field: Name
                transform:
                  type: wrap_array
                  description: "Single operator/owner name — wrap in a one-element list"
              - source: is-samgongustofa
                endpoint: bulk
                field: operator.name
                transform:
                  type: wrap_array
                  description: "Single operator/owner name — wrap in a one-element list"
              - source: kr-koca
                file: statListEn01.do (JSON datatable)
                field: REG_CUSER
                transform:
                  type: wrap_array
                  description: "Single registered owner name (Korean UTF-8 text) — wrap in a one-element list"
              - source: hu-kozhaf
                file: "Aircraft register PDF (date-stamped, discovered via index page)"
                field: "4"
                transform:
                  type: wrap_array
                  description: "Owner name (col 4); embedded newlines collapsed to space; wrapped in a one-element list"
              - source: ge-gcaa
                field: "0"
                table: table_2
                transform:
                  type: wrap_array
                  description: "Owner (table_2 col 0); table_1's operator column is not read; Georgian-script names preserved as UTF-8; wrapped in a one-element list"
              - source: gg-2reg
                file: "PDF (date-encoded, discovered via index page)"
                field: "4"
                transform:
                  type: wrap_array
                  description: "Single registered owner/charterer name — wrap in a one-element list"
              - source: kg-caa
                field: "1"
                transform:
                  type: wrap_array
                  description: "Operator/owner name; rowspan value carried forward across spanned rows — wrap in a one-element list"
              - source: hr-ccaa
                file: "PDF (hash-based, discovered via index page)"
                field: VLASNIK
                transform:
                  type: wrap_array
                  description: "Single registered owner name — wrap in a one-element list"
              - source: cy-dca
                file: Aircraft_Register_Extract.pdf
                field: "AIRCRAFT OWNER/OPERATOR"
                transform:
                  type: collect_non_empty
                  description: "String split on /; each segment trimmed; empty segments discarded"
              - source: ee-transpordiamet
                field: "6"
                transform:
                  type: wrap_array
                  description: "Single registered owner name — wrap in a one-element list"
              - source: mv-caa
                file: "Aircraft register PDF (opaque hash filename; discovered via index page)"
                field: "7"
                transform:
                  type: wrap_array
                  description: "First line of multiline owner/address cell — wrap in a one-element list"
              - source: mk-caa
                file: "AIRCRAFT-REGISTER-DD.MM.YYYY.pdf (date-stamped, discovered via index page)"
                field: "6"
                transform:
                  type: wrap_array
                  description: "Embedded newlines collapsed to space; wrap single owner name in a one-element list"
              - source: pg-casapng
                file: "PNG-civil-aircraft-register-website{date}.pdf (date-stamped, discovered via index page)"
                field: "3"
                transform:
                  type: wrap_array
                  description: "Single operator name — wrap in a one-element list"
              - source: rs-cad
                field: korisnik
                transform:
                  type: wrap_array
                  description: "Single operator name — wrap in a one-element list"
              - source: sk-nsat
                file: WEB-DD.MM.YYYY.pdf (date-stamped, discovered via index page)
                field: "Vlastník"
                transform:
                  type: wrap_array
                  description: "Registered owner; wrapped in a one-element list"
              - source: tc-caa
                file: aircraft-register (HTML page)
                field: "OWNER /OPERATOR"
                transform:
                  type: wrap_array
                  description: "Single owner or operator name — wrap in a one-element list"
              - source: lu-dac
                file: "relev-aronefs-{DD}-{MM}-{YYYY}.pdf"
                field: Propriétaire
                transform:
                  type: wrap_array
                  description: "Owner name; privacy placeholders excluded (PROPRIÉTAIRE PRIVÉ, COPROPRIÉTÉ); wrapped in a one-element list"
              - source: bz-bdca
                file: bdca-civil-aircraft-register (HTML page)
                field: Owner
                transform:
                  type: wrap_array
                  description: "'(Charterer by Demise)' suffix stripped before wrapping in a one-element list"

          street:
            type: "array[string]"
            description: "Street address lines; blank lines omitted"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                fields:
                  - { field: STREET,  position: 7 }
                  - { field: STREET2, position: 8 }
                transform:
                  type: collect_non_empty
              - source: ca-tc
                file: carsownr.txt
                fields:
                  - { field: STREET_NAME,  position: 3 }
                  - { field: STREET_NAME2, position: 4 }
                transform:
                  type: collect_non_empty
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_street
                  description: "All comma-segments except the last two; PO Box segments treated as street lines"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Gateadresse"
                transform:
                  type: wrap_array
                  description: "Single street address line from the Eier/Kontakt owner entry"
              - source: au-casa
                file: acrftreg
                fields:
                  - { field: regholdadd1 }
                  - { field: regholdadd2 }
                transform:
                  type: collect_non_empty
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_street
                  description: "Everything before the 5-digit postal code; omitted if no postal code found (foreign addresses)"
              - source: uk-caa
                endpoint: details
                fields:
                  - { field: "RegisteredAircraftOwners[0].Address1" }
                  - { field: "RegisteredAircraftOwners[0].Address2" }
                transform:
                  type: collect_non_empty
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_street
                  description: "Best-effort parse; third-from-last comma-segment (before PostalCode City and Switzerland); wrapped in a one-element list"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_street
                  description: "Best-effort parse; everything after first comma on line 1 (PostalCode City, Street) of first owner group; wrapped in a one-element list"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Registered Address"
                transform:
                  type: split_comma
                  description: "Country suffix (matching Nationality column) stripped first; remaining string split on commas, each segment trimmed and stored as a separate street line"
              - source: im-ardis
                file: ARDIS search results (HTML table)
                field: "Registered Owners"
                transform:
                  type: split_first_comma_street
                  description: "Everything after the first comma; wrapped in a one-element list"
              - source: me-caa
                page: detail
                field: Address
                transform:
                  type: wrap_array
                  description: "Single street address line — wrap in a one-element list"
              - source: is-samgongustofa
                endpoint: bulk
                field: operator.address
                transform:
                  type: wrap_array
                  description: "Single street address line — wrap in a one-element list"
              - source: hu-kozhaf
                file: "Aircraft register PDF (date-stamped, discovered via index page)"
                field: "5"
                transform:
                  type: wrap_array
                  description: "Owner address; embedded newlines collapsed to space — wrap in a one-element list"
              - source: hr-ccaa
                file: "PDF (hash-based, discovered via index page)"
                field: ADRESA
                transform:
                  type: split_comma
                  description: "Comma-separated address string split into individual street lines"
              - source: mv-caa
                file: "Aircraft register PDF (opaque hash filename; discovered via index page)"
                field: "7"
                transform:
                  type: collect_non_empty
                  description: "Middle lines of multiline owner/address cell (between first and last line); empty lines discarded"
              - source: mk-caa
                file: "AIRCRAFT-REGISTER-DD.MM.YYYY.pdf (date-stamped, discovered via index page)"
                field: "7"
                transform:
                  type: wrap_array
                  description: "Embedded newlines collapsed to space; wrap address in a one-element list"
              - source: pg-casapng
                file: "PNG-civil-aircraft-register-website{date}.pdf (date-stamped, discovered via index page)"
                field: "4"
                transform:
                  type: collect_non_empty
                  description: "Embedded newlines collapsed to space; comma-split; all segments except last; empty segments discarded"
              - source: bz-bdca
                file: bdca-civil-aircraft-register (HTML page)
                field: Address
                transform:
                  type: wrap_array
                  description: "Substring before first comma; omitted if no comma present"

          city:
            type: string
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: CITY
                position: 9
              - source: ca-tc
                file: carsownr.txt
                field: CITY
                position: 5
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_city
                  description: "Second-to-last comma-segment; extract leading word(s) before trailing 3–6 digit postal code; omitted if segment is a PO Box"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Poststed"
              - source: au-casa
                file: acrftreg
                field: regholdSuburb
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_city
                  description: "Everything after the 5-digit postal code (before country); omitted if no postal code found"
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].Town"
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_city
                  description: "Best-effort parse; city portion of second-to-last comma-segment (after 4-digit postal code)"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_city
                  description: "Best-effort parse; word(s) on line 1 of first owner group after the postal code digits and before the first comma"
              - source: me-caa
                page: detail
                field: "Zip code, town"
                transform:
                  type: parse_address_city
                  description: "Text suffix after the leading numeric postal code digits (e.g. '81000 Podgorica' → 'Podgorica')"
              - source: is-samgongustofa
                endpoint: bulk
                field: operator.city

          administrative_area:
            type: string
            description: "First-level country subdivision (US state, Canadian province, etc.)"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: STATE
                position: 10
              - source: ca-tc
                file: carsownr.txt
                field: PROVINCE_OR_STATE_E
                position: 6
              - source: au-casa
                file: acrftreg
                field: regholdState
                description: "Australian state/territory abbreviation (NSW, VIC, QLD, SA, WA, TAS, NT, ACT); passed through as-is"
                # fr-dgac has no administrative_area equivalent
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].County"

          postal_code:
            type: string
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: ZIP CODE
                position: 11
              - source: ca-tc
                file: carsownr.txt
                field: POSTAL_CODE
                position: 8
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_postal
                  description: "Trailing 3–6 digit number from second-to-last comma-segment; omitted if segment is a PO Box"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Postnummer"
              - source: au-casa
                file: acrftreg
                field: regholdPostcode
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_postal
                  description: "5-digit postal code extracted from free-text address; omitted if no 5-digit code found"
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].PostCode"
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_postal
                  description: "Best-effort parse; leading 4-digit postal code from second-to-last comma-segment"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_postal
                  description: "Best-effort parse; leading digit sequence before first space on line 1 of first owner group"
              - source: me-caa
                page: detail
                field: "Zip code, town"
                transform:
                  type: parse_address_postal
                  description: "Leading numeric digit sequence before the first space (e.g. '81000 Podgorica' → '81000')"
              - source: is-samgongustofa
                endpoint: bulk
                field: operator.postcode
              - source: bz-bdca
                file: bdca-civil-aircraft-register (HTML page)
                field: Address
                description: "Substring after first comma; if no comma, entire value used"

          country:
            type: string
            description: "ISO 3166-1 alpha-2 country code"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: COUNTRY
                position: 14
                transform:
                  type: fallback_constant
                  value: "US"
                  description: "Use field value if non-empty; fall back to 'US' for domestic records"
              - source: ca-tc
                file: carsownr.txt
                field: COUNTRY_E
                position: 9
                transform:
                  type: decode_country_name
                  description: "Full English country name (e.g. 'CANADA') → ISO 3166-1 alpha-2 code"
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_country
                  description: "Last comma-segment; mapped to ISO 3166-1 alpha-2 (e.g. 'New Zealand' → 'NZ'); falls back to raw name if unmapped"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Land"
                transform:
                  type: decode_country_name
                  description: "Norwegian names (Norge→NO, Sverige→SE, Danmark→DK) and English names mapped to ISO 3166-1 alpha-2; falls back to raw name if unmapped"
              - source: au-casa
                file: acrftreg
                field: regholdCountry
                transform:
                  type: decode_country_name
                  description: "Full English country name mapped to ISO 3166-1 alpha-2 (e.g. 'Australia' → 'AU'); falls back to raw name if unmapped"
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_country
                  description: "French country name stripped from end of address string (multi-word names checked first); mapped to ISO 3166-1 alpha-2 (e.g. 'FRANCE'→FR, 'ETATS UNIS D\\'AMERIQUE'→US); omitted if country suffix not recognised"
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].Country"
                transform:
                  type: decode_country_name
                  description: "Full English country name mapped to ISO 3166-1 alpha-2 (e.g. 'UNITED KINGDOM' → 'GB'); falls back to raw name if unmapped"
              - source: ch-bazl
                endpoint: bulk
                description: "Always 'CH' — all BAZL-registered aircraft are Swiss-based"
                value: "CH"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: decode_country_name
                  description: "German country name on line 2 of first owner group (e.g. 'Österreich'→AT, 'Deutschland'→DE, 'Tschechische Republik'→CZ); falls back to raw name if unmapped"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Nationality"
                transform:
                  type: decode_country_name
                  description: "Full English country name mapped to ISO 3166-1 alpha-2 (e.g. 'United Kingdom'→GB, 'Cayman Islands'→KY); 'Irish' normalised to IE; case-insensitive ('Cayman islands' typo handled); omitted if unmapped"
              - source: me-caa
                page: detail
                field: Country
                transform:
                  type: decode_country_name
                  description: "Full English country name mapped to ISO 3166-1 alpha-2 (e.g. 'Montenegro'→ME); falls back to raw name if unmapped"
              - source: is-samgongustofa
                endpoint: bulk
                field: operator.country
                transform:
                  type: decode_country_name
                  description: "Icelandic or English country name mapped to ISO 3166-1 alpha-2 (e.g. 'Ísland'→IS, 'Iceland'→IS)"
              - source: mv-caa
                file: "Aircraft register PDF (opaque hash filename; discovered via index page)"
                field: "7"
                transform:
                  type: decode_country_name
                  description: "Last line of multiline owner/address cell; full English country name mapped to ISO 3166-1 alpha-2"
              - source: pg-casapng
                file: "PNG-civil-aircraft-register-website{date}.pdf (date-stamped, discovered via index page)"
                field: "4"
                transform:
                  type: decode_country_name
                  description: "Last comma-segment of address string; 'PNG' expanded to 'Papua New Guinea' before country name lookup"

          type:
            type: string
            description: "Registrant category"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: TYPE REGISTRANT
                position: 5
                transform:
                  type: decode_table
                  values:
                    "1": Individual
                    "2": Partnership
                    "3": Corporation
                    "4": Co-Owned
                    "5": Government
                    "7": LLC
                    "8": "Non-Citizen Corporation"
                    "9": "Non-Citizen Co-Owned"
              - source: ca-tc
                file: carsownr.txt
                field: TYPE_OF_OWNER_E
                position: 11
                transform:
                  type: decode_table
                  values:
                    "Individual": Individual
                    "Entity": Corporation
                    "Manufacturer": Corporation

      aircraft:
        type: object
        description: "Aircraft type and physical specification data"
        persisted: true
        properties:

          type:
            type: string
            description: "Aircraft category (Airplane, Rotorcraft, Glider, etc.)"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: TYPE-ACFT
                position: 3
                transform:
                  type: decode_table
                  values:
                    "1": Glider
                    "2": Balloon
                    "3": "Blimp/Dirigible"
                    "4": Airplane
                    "5": Airplane
                    "6": Rotorcraft
                    "7": Weight-Shift-Control
                    "8": Powered Parachute
                    "9": Gyroplane
              - source: ca-tc
                file: carscurr.txt
                field: AIRCRAFT_CATEGORY_E
                position: 10
                transform:
                  type: decode_table
                  values:
                    "Aeroplane": Airplane
                    "Helicopter": Helicopter
                    "Glider": Glider
                    "Balloon": Balloon
                    "Gyroplane": Gyroplane
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Kategori
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Fly": Airplane
                    "Helikopter": Helicopter
                    "Seilfly": Glider
                    "Ballong": Balloon
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Model Category
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Aeroplane (Aircraft)": Airplane
                    "Amateur Built Aeroplane": Airplane
                    "Helicopter": Helicopter
                    "Amateur Built Helicopter": Helicopter
                    "Microlight Class 1": Microlight
                    "Microlight Class 2": Microlight
                    "Glider": Glider
                    "Power Glider": Powered Glider
                    "Amateur Built Glider": Glider
                    "Gyroplane (Gyrocopter)": Gyroplane
                    "Balloon (hot-air)": Balloon
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Group
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Small aeroplane": Airplane
                    "Large aeroplane": Airplane
                    "Sailplane": Glider
                    "Glider": Glider
                    "MLA, MLH": Microlight
                    "Micro light aeroplane": Microlight
                    "Balloon": Balloon
                    "Rotorcraft": Helicopter
                    "Drones": Drone
              - source: au-casa
                file: acrftreg
                field: Airframe
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Power Driven Aeroplane": Airplane
                    "Rotorcraft": Helicopter
                    "Glider": Glider
                    "Manned Free Balloon": Balloon
                    "Motor-Glider": Powered Glider
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.AircraftClass
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "FIXED-WING LANDPLANE": Airplane
                    "FIXED-WING SEAPLANE": Airplane
                    "FIXED-WING AMPHIBIAN": Airplane
                    "ROTORCRAFT": Helicopter
                    "GLIDER": Glider
                    "POWERED GLIDER": "Powered Glider"
                    "MOTOR GLIDER": "Powered Glider"
                    "FREE BALLOON": Balloon
                    "AIRSHIP": Airship
                    "MICROLIGHT AEROPLANE": Microlight
                    "GYROPLANE": Gyroplane
                    "POWERED LIFT": "Powered Lift"
                    "TILT ROTOR": "Powered Lift"
              - source: ch-bazl
                endpoint: bulk
                field: " Aircraft Type"
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Aeroplane": Airplane
                    "Homebuilt Airplane": Airplane
                    "Helicopter": Helicopter
                    "Homebuilt Helicopter": Helicopter
                    "Glider": Glider
                    "Powered Glider": "Powered Glider"
                    "Homebuild Glider": Glider
                    "Balloon (Hot-air)": Balloon
                    "Balloon (Gas)": Balloon
                    "Airship (Hot-air)": Airship
                    "Ultralight Gyrocopter": Gyroplane
                    "Homebuilt Gyrocopter": Gyroplane
                    "Ultralight (3-axis control)": Microlight
                    "Ecolight": Microlight
                    "Trike": Weight-Shift-Control
              - source: at-austrocontrol
                endpoint: bulk
                field: luftfahrzeugart
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Flugzeug": Airplane
                    "Hubschrauber": Helicopter
                    "Tragschrauber": Gyroplane
                    "Eigenstartfähiger Motorsegler": Powered Glider
                    "Nicht eigenstartfähiger Motorsegler": Glider
              - source: br-anac
                file: dados_aeronaves.json
                field: CDCLS
                transform:
                  type: decode_table
                  description: "Position 1 (index 0) of CDCLS; special value 'RPA' maps to Drone"
                  values:
                    "L": Airplane
                    "H": Helicopter
                    "A": Amphibian
                    "G": Gyroplane
                    "S": Seaplane
                    "RPA": Drone
              - source: es-aesa
                file: aeronaves_inscritas.pdf
                field: Clase
                transform:
                  type: decode_table
                  values:
                    "AVION": Airplane
