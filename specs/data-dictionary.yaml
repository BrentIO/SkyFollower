# SkyFollower Data Dictionary
#
# Defines the canonical completed-flight record: field types, data sources,
# column positions, transforms, and persistence rules.
#
# Merge strategy: within each field's sources list, the FIRST source that
# provides a non-null value wins, unless merge_strategy is overridden for
# that field.
#
# persisted: true  (default) — field is written to the S3 archive record.
# persisted: false — field is used during processing only; omitted on persist.
#
# persist_as — overrides the persisted shape for object fields that collapse
# to a scalar on write (e.g. origin/destination objects → ICAO code string).

version: "1.0"
description: >
  Field-level data dictionary for SkyFollower record types. Defines sources,
  column positions, transforms, merge priority, and persistence rules for each
  field in every record type. Add new record types under records: as the
  project expands.

merge_strategy_default: first_wins

# ── Source definitions ───────────────────────────────────────────────────────
# Sources listed here are referenced by name throughout the fields section.
# The order within each field's sources[] list defines priority.

sources:

  mictronics:
    description: "Mictronics global aircraft database — type designators, military/interesting flags, and operators"
    url: "https://www.mictronics.de/aircraft-database/indexedDB.php"
    format: zip+json
    cadence: weekly_tuesday
    files:
      - name: aircrafts.json
        format: "object: icao_hex → [registration, type_designator, flags_string]"
        notes: "flags_string is a 2-char string; [0]='1' → military, [1]='1' → interesting"
      - name: types.json
        format: "object: type_designator → [manufacturer_model, description, wtc_code]"
      - name: operators.json
        format: "object: airline_designator → [name, country, callsign]"

  us-faa:
    description: "FAA Releasable Aircraft Database — US N-number registrations"
    url: "https://registry.faa.gov/database/ReleasableAircraft.zip"
    format: zip+csv
    cadence: weekly_saturday
    notes: "Requires User-Agent: 'P5Software AROI' header; 2017+ column layout"
    files:
      - name: master.txt
        format: csv
        description: "Active N-number registrations"
        columns:
          0:  N-NUMBER
          1:  SERIAL NUMBER
          2:  MFR MDL CODE
          3:  ENG MFR MDL CODE
          4:  YEAR MFR
          5:  TYPE REGISTRANT
          6:  NAME
          7:  STREET
          8:  STREET2
          9:  CITY
          10: STATE
          11: ZIP CODE
          12: REGION
          13: COUNTY
          14: COUNTRY
          24: "OTHER NAMES(1)"
          25: "OTHER NAMES(2)"
          26: "OTHER NAMES(3)"
          27: "OTHER NAMES(4)"
          28: "OTHER NAMES(5)"
          33: MODE S CODE HEX
      - name: acftref.txt
        format: csv
        description: "Aircraft type reference; joined via master.txt MFR MDL CODE"
        columns:
          0: CODE
          1: MFG
          2: MODEL
          3: TYPE-ACFT
          4: TYPE-ENG
          5: CLASS
          7: NO-ENG
          8: NO-SEATS
          9: AC-WEIGHT
      - name: engine.txt
        format: csv
        description: "Engine reference; joined via master.txt ENG MFR MDL CODE"
        columns:
          0: CODE
          1: MFR
          2: MODEL
          3: TYPE
          4: HORSEPOWER
          5: THRUST

  ca-tc:
    description: "Transport Canada Civil Aircraft Register — Canadian C- registrations"
    url: "https://wwwapps.tc.gc.ca/Saf-Sec-Sur/2/CCARCS-RIACC/ReleaseAccessEN.aspx"
    format: zip+csv
    cadence: weekly_sunday
    notes: "Owner data is in carsownr.txt (separate file); multiple rows per mark possible — filter ACTIVE_FLAG='A'"
    files:
      - name: carscurr.txt
        format: csv
        description: "Primary aircraft registration record; one row per mark"
        columns:
          0:  MARK
          3:  COMMON_NAME
          4:  MODEL_NAME
          5:  MANUFACTURERS_SERIAL_NUMBER
          7:  ID_PLATE_MANUFACTURERS_NAME
          10: AIRCRAFT_CATEGORY_E
          13: ENGINE_MANUF_E
          15: ENGINE_CATEGORY_E
          17: NUMBER_OF_ENGINES
          18: NUMBER_OF_SEATS
          31: DATE_MANUFACTURE_ASSEMBLY
          42: MODE_S_TRANSPONDER_BINARY
          46: TRIMMED_MARK
        transforms:
          MODE_S_TRANSPONDER_BINARY: "24-char binary string — format(int(value, 2), '06X') → ICAO hex"
          TRIMMED_MARK: "MARK without leading spaces; prepend 'C-' to form full registration"
          DATE_MANUFACTURE_ASSEMBLY: "YYYY/MM/DD — replace '/' with '-' for ISO 8601"
      - name: carsownr.txt
        format: csv
        description: "Owner/registrant records; joined to carscurr.txt by MARK_LINK = MARK; filter ACTIVE_FLAG='A'"
        join: "carsownr.txt[0] MARK_LINK = carscurr.txt[0] MARK"
        columns:
          0:  MARK_LINK
          1:  FULL_NAME
          2:  TRADE_NAME
          3:  STREET_NAME
          4:  STREET_NAME2
          5:  CITY
          6:  PROVINCE_OR_STATE_E
          8:  POSTAL_CODE
          9:  COUNTRY_E
          11: TYPE_OF_OWNER_E
          13: ACTIVE_FLAG
        notes: "TYPE_OF_OWNER_E stores decoded English strings ('Individual', 'Entity') not raw codes; COUNTRY_E stores full country name (e.g. 'CANADA') not ISO code"

  no-caa:
    description: "Norway Civil Aviation Authority (CAA) aircraft register — LN-prefix registrations"
    url: "https://data.caa.no/nlr/norgesluftfartoyregister.json"
    format: json
    cadence: weekly_wednesday
    notes: "JSON object with 'headers' and 'data' keys; ~1,038 records; owner country field uses Norwegian names for Norway/Sweden/Denmark and English names for all others; Eier(e) array may contain multiple owners — Eier/Kontakt entry used for address fields"
    files:
      - name: norgesluftfartoyregister.json
        format: "object: { headers, data: [ record, ... ] }"
        fields:
          Registreringsmerke:               registration mark (LN- prefix)
          Kategori:                         aircraft category (Fly, Helikopter, Seilfly, Ballong)
          Type:                             aircraft model designation
          Produsent:                        aircraft manufacturer/builder
          Serienummer:                      manufacturer serial number
          Byggeår:                          4-digit build year
          "Eier(e)":                        "array of owner objects; each has Eier type, Navn, Gateadresse, Postnummer, Poststed, Land"
          "ICAO 24-bits adresse":           "array of objects keyed Desimal/Binær/Oktal/Heksadesimal"

  fr-dgac:
    description: "France Direction Générale de l'Aviation Civile (DGAC) aircraft register — F-prefix registrations"
    url: "https://immat.aviation-civile.gouv.fr/immat/servlet/static/upload/export.csv"
    format: csv
    cadence: weekly_wednesday
    notes: "UTF-8 with BOM (decode utf-8-sig); semicolon-delimited; ~43,069 rows with 40,522 unique F- registrations; co-ownership rows share IMMATRICULATION — group by registration, collect all unique PROPRIETAIRE names, use first non-blank ADRESSE_PROPRIETAIRE for address; no ICAO hex — resolved via RediSearch reverse-lookup against Mictronics records; must run after Mictronics; GDPR blanks mean ~45% have PROPRIETAIRE and ~24% have ADRESSE_PROPRIETAIRE; country names in French"
    files:
      - name: export.csv
        format: csv
        delimiter: ";"
        columns:
          IMMATRICULATION:           registration mark (F- prefix already present)
          CONSTRUCTEUR:              aircraft manufacturer
          MODELE:                    aircraft model
          NUMERO_SERIE:              serial number
          AERODROME_ATTACHE:         home aerodrome name (dropped — not an ICAO code)
          PROPRIETAIRE:              registrant name (blank for individuals per GDPR)
          ADRESSE_PROPRIETAIRE:      free-text registrant address; country names in French
          LOCATAIRE:                 lessee name (dropped)
          ADRESSE_LOCATAIRE:         lessee address (dropped)
          CREANCIER_HYPOTHEQUE:      mortgage creditor (dropped)
          ADRESSE_CREANCIER:         creditor address (dropped)
          PERSONNE_SAISISSANTE:      seizure person (dropped)
          ADRESSE_PERSONNE_SAISISSANTE: seizure person address (dropped)

  nl-ilt:
    description: "Netherlands Inspectie Leefomgeving en Transport (ILT) civil aircraft register — PH-prefix registrations"
    url: "https://www.ilent.nl/documenten/lijsten/luchtvaart/databestanden/luchtvaartregister-data"
    format: ods
    cadence: weekly_thursday
    notes: "ODS (OpenDocument Spreadsheet) parsed with odfpy; URL is date-stamped and changes monthly — runner scrapes the ILT index page to discover the current link; ~3,225 records with valid ICAO hex; row 0 = annotated headers (bracket annotations stripped), row 1 = informational text (skipped), row 2+ = data; cells may carry numbercolumnsrepeated attribute — must be expanded to avoid column misalignment; ICAO hex is published directly in X-Ponder column so no RediSearch reverse-lookup required; no owner/registrant data published; filter rows where X-Ponder is not a valid 6-char hex (covers deregistered records); EngManufacturer='Unknown' and EngModel containing 'not further defined' are omitted"
    files:
      - name: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
        format: ods
        columns:
          Flag:             registration status (rows with blank X-Ponder are deregistered; filtered by hex validity)
          Registration:     full PH-prefix registration mark
          Manufacturer:     aircraft manufacturer
          Model:            aircraft model designation
          Serial:           manufacturer serial number
          X-Ponder:         6-character uppercase ICAO Mode S hex (direct; no lookup required)
          Built:            4-digit year of manufacture
          Group:            aircraft type category (decoded to canonical type)
          ICAO-code:        ICAO 4-character type designator
          Engines:          number of engines
          EngKind:          engine type description (decoded to canonical type)
          EngManufacturer:  engine manufacturer name
          EngModel:         engine model designation

  au-casa:
    description: "Australia Civil Aviation Safety Authority (CASA) aircraft register — VH-prefix registrations"
    url: "https://services.casa.gov.au/CSV/acrftreg.csv"
    format: csv
    cadence: weekly_tuesday
    notes: "UTF-8 with BOM (decode utf-8-sig); ~16,626 rows; no ICAO hex column — icao_hex resolved via RediSearch reverse-lookup by registration against Mictronics records; must run after Mictronics; filter suspendstatus='Suspended' rows; all marks are 3-char suffixes — prepend 'VH-'"
    files:
      - name: acrftreg
        format: csv
        columns:
          Mark:             3-character registration suffix (prepend VH-)
          suspendstatus:    filter out Suspended records
          Airframe:         aircraft category
          Manu:             aircraft manufacturer
          Model:            aircraft model designation
          Serial:           manufacturer serial number
          Yearmanu:         4-digit year of manufacture
          ICAOtypedesig:    ICAO 4-character type designator
          engnum:           number of engines
          Engmanu:          engine manufacturer
          Engtype:          engine type
          Engmodel:         engine model
          regholdname:      registrant name
          regholdadd1:      address line 1
          regholdadd2:      address line 2
          regholdSuburb:    city/suburb
          regholdState:     state or territory abbreviation
          regholdPostcode:  postal code
          regholdCountry:   country name (full English)

  nz-caa:
    description: "New Zealand Civil Aviation Authority aircraft register — ZK-prefix registrations"
    url: "https://www.aviation.govt.nz/assets/aircraft/aircraft-register/Aircraft-Register-for-website-.csv"
    format: csv
    cadence: weekly_wednesday
    notes: "UTF-8 with BOM; single-file CSV; ~4,000 rows; Owner Address is free-text parsed into address components; 151 rows have blank Owner Address (all 'Private Owner')"
    files:
      - name: Aircraft-Register-for-website-.csv
        format: csv
        columns:
          Model Category:    aircraft type category
          Registration Mark: ZK-prefix registration mark
          Manufacturer:      aircraft manufacturer name
          Model:             aircraft model designation
          Serial No.:        manufacturer serial number
          Owner Name:        registered owner name
          Owner Address:     free-text address (parsed into street/city/postal_code/country)
          Mode S Code HEX:   6-character uppercase hex ICAO address

  bs-caa:
    description: "Bahamas Civil Aviation Authority (CAA) aircraft register — C6-prefix registrations"
    url: "https://caabahamas.com/registers/"
    format: pdf
    cadence: weekly_friday
    notes: "PDF generated from Microsoft Excel; ~139 rows across 3 pages; URL is date-stamped and changes with each update — runner scrapes the CAA registers page to discover the current link; no ICAO hex column — icao_hex resolved via RediSearch reverse-lookup by registration against Mictronics records; must run after Mictronics; no manufacturer column (combined with model in AIRCRAFT TYPE - MAKE/MODEL); no powerplant or address data available"
    files:
      - name: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
        format: pdf
        columns:
          "AIRCRAFT REGISTRATION NUMBER": full C6-prefix registration mark
          "REGISTERED OWNER OF AIRCRAFT": registered owner name
          "AIRCRAFT TYPE - MAKE/MODEL":   combined make and model free-text (stored as aircraft.model)
          "SERIAL #":                     manufacturer serial number

  ch-bazl:
    description: "Switzerland Federal Office of Civil Aviation (FOCA/BAZL) aircraft register — HB-prefix registrations"
    url: "https://app02.bazl.admin.ch/web/bazl-backend/lfr/csv"
    format: api
    cadence: weekly_tuesday
    notes: "Undocumented public REST API; no auth required; returns UTF-16 BE encoded semicolon-delimited CSV via POST with JSON body; single bulk download of all registered aircraft (~3,100 records); 'Main Owner' address is a single unstructured string parsed best-effort (Name[, Canton]?, Street, PostalCode City, Switzerland); canton abbreviation (2-letter) stripped from name; MOPSC = Maximum Operational Passenger Seating Configuration"
    endpoints:
      bulk:
        method: POST
        path: /lfr/csv
        body:
          page_result_limit: 10000
          current_page_number: 1
          sort_list: registration
          language: en
          queryProperties:
            aircraftStatus: ["Registered"]
        description: "Full register download; response is UTF-16 BE CSV with semicolon delimiters; columns have a leading space in their names"

  at-austrocontrol:
    description: "Austria Austrocontrol aircraft register — OE-prefix registrations"
    url: "https://www.austrocontrol.at/lfa-publish-service/v2/oenfl/luftfahrzeuge"
    format: api
    cadence: weekly_tuesday
    notes: "Undocumented public REST API; no auth required; returns flat JSON array of all registered aircraft (~1,874 records); loeschung (deregistration date) is null for all returned records — API appears pre-filtered to active aircraft; no ICAO hex — icao_hex resolved via RediSearch reverse-lookup by OE-{kennzeichen} registration against Mictronics records; must run after Mictronics; all kennzeichen receive OE- prefix (alpha-only e.g. OE-ARG and digit-only e.g. OE-9522); halter (owner) is \\r\\n-delimited multiline string; groups of three lines per co-owner (name, PostalCode City, Street, country); only first owner group used"
    endpoints:
      bulk:
        method: GET
        path: "/lfa-publish-service/v2/oenfl/luftfahrzeuge?page=0&size=10000"
        description: "Full register download; returns flat JSON array; all active registered aircraft in one page"

  ky-caa:
    description: "Cayman Islands Civil Aviation Authority (CAA) aircraft register — VP-C-prefix registrations"
    url: "https://www.caacayman.com/wp-content/uploads/Active-Aircraft-Register.pdf"
    format: pdf
    cadence: weekly_thursday
    notes: "Static PDF URL (does not change with updates); ~211 rows across 10 pages; no ICAO hex column — icao_hex resolved via RediSearch reverse-lookup by VP-C registration against Mictronics records; must run after Mictronics; 'Series Type' column combines manufacturer and model in a single field (stored as aircraft.model); no type designator or powerplant data available; 'Nationality' column is a clean English country name that always matches the country suffix of 'Registered Address' — used for registrant.country and to strip the suffix from the stored street; column headers contain embedded newlines — normalised by collapsing to single space; 'Cayman islands' (lowercase i) typo appears in actual PDF data and is normalised during ISO code lookup"
    files:
      - name: "Active-Aircraft-Register.pdf"
        format: pdf
        columns:
          "Aircraft Registration": full VP-C-prefix registration mark
          "Registered Owner":      registered owner name
          "Registered Address":    international free-text address; country suffix stripped (see Nationality column) then split on commas into registrant.street lines
          "Nationality":           clean English country name (e.g. 'United Kingdom', 'Cayman Islands'); mapped to ISO 3166-1 alpha-2 for registrant.country
          "Series Type":           combined manufacturer and model free-text (stored as aircraft.model)
          "Serial Number":         manufacturer serial number

  uk-caa:
    description: "UK Civil Aviation Authority G-INFO aircraft register — G-prefix registrations"
    url: "https://ginfoapi.caa.co.uk"
    format: api
    cadence: weekly_tuesday
    notes: "Undocumented public REST API; no auth required; User-Agent 'P5Software SkyFollower' required; enumerates target records via Redis SCAN on UK ICAO hex range 400000–43FFFF (pattern icao_hex:4[0123]*); can only enrich records already present in Redis — must run after Mictronics; caches AircraftID in the foreign_key field on each Redis record to skip the search call on subsequent runs"
    endpoints:
      search:
        method: POST
        path: /api/aircraft/search
        body_field: Registration
        description: "Search by registration mark suffix (Mark field without leading G-); returns array of {AircraftID, Mark, RegistrationStatus}"
      details:
        method: GET
        path: "/api/aircraft/details/{AircraftID}"
        description: "Full aircraft record including ICAO24BitAircraftAddress, Mark, Manufacturer, Type, ICAOAircraftTypeDesignator, AircraftClass, YearBuild, Engines[], and RegisteredAircraftOwners[]"

  ourairports:
    description: "OurAirports global airport database — airport:{icao_code} Redis keys"
    url: "https://davidmegginson.github.io/ourairports-data/airports.csv"
    format: csv
    cadence: weekly_monday
    notes: "Filtered to 4-character ICAO codes only (3-char and other-length idents dropped); stored as Redis JSON via JSON.SET in airport:{icao_code} keys; RediSearch index idx:airport on icao_code and iata_code TagFields; phonic name computed algorithmically from name + municipality fields with optional host-provided phonic_overrides.json override file; iata_code omitted if blank; latitude/longitude stored as floats"
    files:
      - name: airports.csv
        format: csv
        columns:
          ident:          4-character ICAO airport code (primary key; non-4-char rows dropped)
          iata_code:      IATA 3-character airport code (omitted from record if blank)
          name:           official airport name
          municipality:   city/municipality name (stored as city)
          iso_region:     ISO 3166-2 subdivision code (e.g. US-FL; stored as region)
          iso_country:    ISO 3166-1 alpha-2 country code
          latitude_deg:   decimal latitude (stored as latitude float)
          longitude_deg:  decimal longitude (stored as longitude float)

  standing-data:
    description: "VRS Standing Data — operators, airports, and flight routes"
    url: "https://github.com/vradarserver/standing-data"
    format: csv
    cadence: weekly_tuesday

  flightaware:
    description: "FlightAware origin/destination enrichment (paid; optional)"
    format: api
    cadence: every_3_days
    status: optional

  processor:
    description: "Derived in real time by the message processor from ADS-B messages"


# ── Record definitions ─────────────────────────────────────────────────────
# Each record type defines the fields for one Redis enrichment record or the
# completed flight S3 archive record. Sources and merge rules apply per-record.

records:

  flight:
    description: >
      Completed flight record. Written to S3 on flight completion and used as
      the authoritative archive document. Also defines the icao_hex:{hex} Redis
      enrichment shape written by data runners.
    storage: S3
    s3_path: "flights/{YYYY}/{MM}/{DD}/{icao_hex}_{ident}_{uuid}.json.gz"
    redis_key: "icao_hex:{icao_hex}"
    fields:

      _id:
        type: string
        description: "UUID-v7 unique flight identifier"
        persisted: true
        sources:
          - source: processor
            transform:
              type: generate
              function: uuid7

      first_message:
        type: datetime
        description: "UTC timestamp of the first ADS-B message in this flight"
        persisted: true
        sources:
          - source: processor

      last_message:
        type: datetime
        description: "UTC timestamp of the most recent ADS-B message"
        persisted: true
        sources:
          - source: processor

      total_messages:
        type: integer
        description: "Total count of ADS-B messages received for this flight"
        persisted: true
        sources:
          - source: processor

      icao_hex:
        type: string
        description: "6-character uppercase ICAO Mode S hex identifier (e.g. A8AE7F); primary key for Redis enrichment records"
        persisted: true
        sources:
          - source: processor
            description: "Present in every ADS-B message"
          - source: mictronics
            file: aircrafts.json
            description: "JSON object key; already a 6-character uppercase hex string"
          - source: us-faa
            file: master.txt
            field: MODE S CODE HEX
            position: 33
            transform:
              type: uppercase
              description: "Field is hex but may be mixed case — normalise to uppercase"
          - source: ca-tc
            file: carscurr.txt
            field: MODE_S_TRANSPONDER_BINARY
            position: 42
            transform:
              type: binary_to_hex
              description: "24-character binary string — format(int(value, 2), '06X') → 6-character uppercase hex"
          - source: nz-caa
            file: Aircraft-Register-for-website-.csv
            field: Mode S Code HEX
            transform:
              type: uppercase
              description: "Field is already 6-character hex — normalise to uppercase and strip whitespace"
          - source: no-caa
            file: norgesluftfartoyregister.json
            field: "ICAO 24-bits adresse[].Heksadesimal"
            transform:
              type: uppercase
              description: "Extract Heksadesimal entry from the ICAO address array; normalise to uppercase"
          - source: nl-ilt
            file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
            field: X-Ponder
            transform:
              type: uppercase
              description: "6-character hex string; normalise to uppercase and strip whitespace"
          - source: au-casa
            file: acrftreg
            description: "CASA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{VH\\-XXX} against Mictronics records; enriches existing records only"
          - source: fr-dgac
            file: export.csv
            description: "DGAC does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{F\\-XXX} against Mictronics records; enriches existing records only"
          - source: bs-caa
            file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
            description: "Bahamas CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{C6\\-XXX} against Mictronics records; enriches existing records only"
          - source: ky-caa
            file: Active-Aircraft-Register.pdf
            description: "Cayman Islands CAA does not publish ICAO hex; resolved via FT.SEARCH idx:aircraft @registration:{VP\\-CXXX} against Mictronics records; enriches existing records only"
          - source: uk-caa
            endpoint: details
            field: AircraftDetails.ICAO24BitAircraftAddress.Hex
            transform:
              type: uppercase
              description: "Hex string normalised to uppercase"
          - source: ch-bazl
            endpoint: bulk
            field: " Aircraft Address HEX"
            transform:
              type: uppercase
              description: "6-character hex string normalised to uppercase"

      registration:
        type: string
        description: "Aircraft registration mark (e.g. N659DL, C-FEGI)"
        persisted: true
        sources:
          - source: us-faa
            file: master.txt
            field: N-NUMBER
            position: 0
            transform:
              type: prefix
              value: "N"
              description: "Prepend 'N' to the stored number to form the full mark"
          - source: ca-tc
            file: carscurr.txt
            field: TRIMMED_MARK
            position: 46
            transform:
              type: prefix
              value: "C-"
              description: "Prepend 'C-' to the stored mark to form the full registration"
          - source: mictronics
            file: aircrafts.json
            field: "values[0]"
          - source: nz-caa
            file: Aircraft-Register-for-website-.csv
            field: Registration Mark
            description: "Full registration mark including ZK- prefix (e.g. ZK-AAC)"
          - source: no-caa
            file: norgesluftfartoyregister.json
            field: Registreringsmerke
            description: "Full registration mark including LN- prefix (e.g. LN-ABA)"
          - source: au-casa
            file: acrftreg
            field: Mark
            transform:
              type: prefix
              value: "VH-"
              description: "Prepend 'VH-' to the 3-character mark suffix to form the full registration"
          - source: nl-ilt
            file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
            field: Registration
            description: "Full registration mark including PH- prefix (e.g. PH-ABC)"
          - source: fr-dgac
            file: export.csv
            field: IMMATRICULATION
            description: "Full registration mark including F- prefix (e.g. F-BKDK)"
          - source: bs-caa
            file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
            field: AIRCRAFT REGISTRATION NUMBER
            description: "Full registration mark including C6- prefix (e.g. C6-BFY)"
          - source: ky-caa
            file: Active-Aircraft-Register.pdf
            field: "Aircraft Registration"
            description: "Full registration mark including VP-C prefix (e.g. VP-CAD)"
          - source: uk-caa
            endpoint: details
            field: RegistrationDetails.Mark
            transform:
              type: prefix
              value: "G-"
              description: "Prepend 'G-' to the stored mark to form the full registration"
          - source: ch-bazl
            endpoint: bulk
            field: " Registration"
            description: "Full registration mark including HB- prefix (e.g. HB-JNA)"

      registrant:
        type: object
        description: "Owner/registrant information from the national civil aircraft registry"
        persisted: true
        properties:

          names:
            type: "array[string]"
            description: "Registrant name(s); primary name is first; additional DBA names follow"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                fields:
                  - { field: NAME,            position: 6  }
                  - { field: "OTHER NAMES(1)", position: 24 }
                  - { field: "OTHER NAMES(2)", position: 25 }
                  - { field: "OTHER NAMES(3)", position: 26 }
                  - { field: "OTHER NAMES(4)", position: 27 }
                  - { field: "OTHER NAMES(5)", position: 28 }
                transform:
                  type: collect_non_empty
                  description: "Collect all non-blank name fields in column order into an array"
              - source: ca-tc
                file: carsownr.txt
                fields:
                  - { field: FULL_NAME,   position: 1 }
                  - { field: TRADE_NAME,  position: 2 }
                transform:
                  type: collect_non_empty
                  description: "Collect FULL_NAME then TRADE_NAME; filter ACTIVE_FLAG='A' rows first"
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Name
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[].Navn"
                transform:
                  type: collect_ordered
                  description: "Eier/Kontakt entry first, then all Eier entries; deduplicated"
              - source: au-casa
                file: acrftreg
                field: regholdname
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list"
              - source: fr-dgac
                file: export.csv
                field: PROPRIETAIRE
                transform:
                  type: collect_ordered
                  description: "Rows are grouped by IMMATRICULATION (co-ownership); all unique non-blank PROPRIETAIRE values collected in order of first appearance; blank for individuals per GDPR"
              - source: bs-caa
                file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
                field: REGISTERED OWNER OF AIRCRAFT
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Registered Owner"
                transform:
                  type: wrap_array
                  description: "Single name — wrap in a one-element list; embedded newlines normalised to spaces"
              - source: uk-caa
                endpoint: details
                fields:
                  - { field: "RegisteredAircraftOwners[0].RegisteredOwner" }
                  - { field: "RegisteredAircraftOwners[0].TradingAs" }
                transform:
                  type: collect_non_empty
                  description: "RegisteredOwner first; TradingAs appended if non-null"
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_name
                  description: "Best-effort parse of 'Name[, Canton]?, Street, PostalCode City, Switzerland'; all comma-segments before the street; 2-letter canton abbreviations filtered out; wrapped in a one-element list"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_name
                  description: "Best-effort parse; line 0 of first owner group (\\r\\n-delimited); surrounding quotes stripped; wrapped in a one-element list"

          street:
            type: "array[string]"
            description: "Street address lines; blank lines omitted"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                fields:
                  - { field: STREET,  position: 7 }
                  - { field: STREET2, position: 8 }
                transform:
                  type: collect_non_empty
              - source: ca-tc
                file: carsownr.txt
                fields:
                  - { field: STREET_NAME,  position: 3 }
                  - { field: STREET_NAME2, position: 4 }
                transform:
                  type: collect_non_empty
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_street
                  description: "All comma-segments except the last two; PO Box segments treated as street lines"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Gateadresse"
                transform:
                  type: wrap_array
                  description: "Single street address line from the Eier/Kontakt owner entry"
              - source: au-casa
                file: acrftreg
                fields:
                  - { field: regholdadd1 }
                  - { field: regholdadd2 }
                transform:
                  type: collect_non_empty
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_street
                  description: "Everything before the 5-digit postal code; omitted if no postal code found (foreign addresses)"
              - source: uk-caa
                endpoint: details
                fields:
                  - { field: "RegisteredAircraftOwners[0].Address1" }
                  - { field: "RegisteredAircraftOwners[0].Address2" }
                transform:
                  type: collect_non_empty
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_street
                  description: "Best-effort parse; third-from-last comma-segment (before PostalCode City and Switzerland); wrapped in a one-element list"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_street
                  description: "Best-effort parse; everything after first comma on line 1 (PostalCode City, Street) of first owner group; wrapped in a one-element list"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Registered Address"
                transform:
                  type: split_comma
                  description: "Country suffix (matching Nationality column) stripped first; remaining string split on commas, each segment trimmed and stored as a separate street line"

          city:
            type: string
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: CITY
                position: 9
              - source: ca-tc
                file: carsownr.txt
                field: CITY
                position: 5
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_city
                  description: "Second-to-last comma-segment; extract leading word(s) before trailing 3–6 digit postal code; omitted if segment is a PO Box"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Poststed"
              - source: au-casa
                file: acrftreg
                field: regholdSuburb
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_city
                  description: "Everything after the 5-digit postal code (before country); omitted if no postal code found"
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].Town"
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_city
                  description: "Best-effort parse; city portion of second-to-last comma-segment (after 4-digit postal code)"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_city
                  description: "Best-effort parse; word(s) on line 1 of first owner group after the postal code digits and before the first comma"

          administrative_area:
            type: string
            description: "First-level country subdivision (US state, Canadian province, etc.)"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: STATE
                position: 10
              - source: ca-tc
                file: carsownr.txt
                field: PROVINCE_OR_STATE_E
                position: 6
              - source: au-casa
                file: acrftreg
                field: regholdState
                description: "Australian state/territory abbreviation (NSW, VIC, QLD, SA, WA, TAS, NT, ACT); passed through as-is"
                # fr-dgac has no administrative_area equivalent
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].County"

          postal_code:
            type: string
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: ZIP CODE
                position: 11
              - source: ca-tc
                file: carsownr.txt
                field: POSTAL_CODE
                position: 8
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_postal
                  description: "Trailing 3–6 digit number from second-to-last comma-segment; omitted if segment is a PO Box"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Postnummer"
              - source: au-casa
                file: acrftreg
                field: regholdPostcode
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_postal
                  description: "5-digit postal code extracted from free-text address; omitted if no 5-digit code found"
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].PostCode"
              - source: ch-bazl
                endpoint: bulk
                field: " Main Owner"
                transform:
                  type: parse_address_postal
                  description: "Best-effort parse; leading 4-digit postal code from second-to-last comma-segment"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: parse_address_postal
                  description: "Best-effort parse; leading digit sequence before first space on line 1 of first owner group"

          country:
            type: string
            description: "ISO 3166-1 alpha-2 country code"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: COUNTRY
                position: 14
                transform:
                  type: fallback_constant
                  value: "US"
                  description: "Use field value if non-empty; fall back to 'US' for domestic records"
              - source: ca-tc
                file: carsownr.txt
                field: COUNTRY_E
                position: 9
                transform:
                  type: decode_country_name
                  description: "Full English country name (e.g. 'CANADA') → ISO 3166-1 alpha-2 code"
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Owner Address
                transform:
                  type: parse_address_country
                  description: "Last comma-segment; mapped to ISO 3166-1 alpha-2 (e.g. 'New Zealand' → 'NZ'); falls back to raw name if unmapped"
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: "Eier(e)[Eier/Kontakt].Land"
                transform:
                  type: decode_country_name
                  description: "Norwegian names (Norge→NO, Sverige→SE, Danmark→DK) and English names mapped to ISO 3166-1 alpha-2; falls back to raw name if unmapped"
              - source: au-casa
                file: acrftreg
                field: regholdCountry
                transform:
                  type: decode_country_name
                  description: "Full English country name mapped to ISO 3166-1 alpha-2 (e.g. 'Australia' → 'AU'); falls back to raw name if unmapped"
              - source: fr-dgac
                file: export.csv
                field: ADRESSE_PROPRIETAIRE
                transform:
                  type: parse_address_country
                  description: "French country name stripped from end of address string (multi-word names checked first); mapped to ISO 3166-1 alpha-2 (e.g. 'FRANCE'→FR, 'ETATS UNIS D\\'AMERIQUE'→US); omitted if country suffix not recognised"
              - source: uk-caa
                endpoint: details
                field: "RegisteredAircraftOwners[0].Country"
                transform:
                  type: decode_country_name
                  description: "Full English country name mapped to ISO 3166-1 alpha-2 (e.g. 'UNITED KINGDOM' → 'GB'); falls back to raw name if unmapped"
              - source: ch-bazl
                endpoint: bulk
                description: "Always 'CH' — all BAZL-registered aircraft are Swiss-based"
                value: "CH"
              - source: at-austrocontrol
                endpoint: bulk
                field: halter
                transform:
                  type: decode_country_name
                  description: "German country name on line 2 of first owner group (e.g. 'Österreich'→AT, 'Deutschland'→DE, 'Tschechische Republik'→CZ); falls back to raw name if unmapped"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Nationality"
                transform:
                  type: decode_country_name
                  description: "Full English country name mapped to ISO 3166-1 alpha-2 (e.g. 'United Kingdom'→GB, 'Cayman Islands'→KY); 'Irish' normalised to IE; case-insensitive ('Cayman islands' typo handled); omitted if unmapped"

          type:
            type: string
            description: "Registrant category"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: TYPE REGISTRANT
                position: 5
                transform:
                  type: decode_table
                  values:
                    "1": Individual
                    "2": Partnership
                    "3": Corporation
                    "4": Co-Owned
                    "5": Government
                    "7": LLC
                    "8": "Non-Citizen Corporation"
                    "9": "Non-Citizen Co-Owned"
              - source: ca-tc
                file: carsownr.txt
                field: TYPE_OF_OWNER_E
                position: 11
                transform:
                  type: decode_table
                  values:
                    "Individual": Individual
                    "Entity": Corporation
                    "Manufacturer": Corporation

      aircraft:
        type: object
        description: "Aircraft type and physical specification data"
        persisted: true
        properties:

          type:
            type: string
            description: "Aircraft category (Airplane, Rotorcraft, Glider, etc.)"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: TYPE-ACFT
                position: 3
                transform:
                  type: decode_table
                  values:
                    "1": Glider
                    "2": Balloon
                    "3": "Blimp/Dirigible"
                    "4": Airplane
                    "5": Airplane
                    "6": Rotorcraft
                    "7": Weight-Shift-Control
                    "8": Powered Parachute
                    "9": Gyroplane
              - source: ca-tc
                file: carscurr.txt
                field: AIRCRAFT_CATEGORY_E
                position: 10
                transform:
                  type: decode_table
                  values:
                    "Aeroplane": Airplane
                    "Helicopter": Helicopter
                    "Glider": Glider
                    "Balloon": Balloon
                    "Gyroplane": Gyroplane
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Kategori
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Fly": Airplane
                    "Helikopter": Helicopter
                    "Seilfly": Glider
                    "Ballong": Balloon
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Model Category
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Aeroplane (Aircraft)": Airplane
                    "Amateur Built Aeroplane": Airplane
                    "Helicopter": Helicopter
                    "Amateur Built Helicopter": Helicopter
                    "Microlight Class 1": Microlight
                    "Microlight Class 2": Microlight
                    "Glider": Glider
                    "Power Glider": Glider
                    "Amateur Built Glider": Glider
                    "Gyroplane (Gyrocopter)": Gyroplane
                    "Balloon (hot-air)": Balloon
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Group
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Small aeroplane": Airplane
                    "Large aeroplane": Airplane
                    "Sailplane": Glider
                    "Glider": Glider
                    "MLA, MLH": Microlight
                    "Micro light aeroplane": Microlight
                    "Balloon": Balloon
                    "Rotorcraft": Helicopter
                    "Drones": Drone
              - source: au-casa
                file: acrftreg
                field: Airframe
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Power Driven Aeroplane": Airplane
                    "Rotorcraft": Helicopter
                    "Glider": Glider
                    "Manned Free Balloon": Balloon
                    "Motor-Glider": Glider
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.AircraftClass
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "FIXED-WING LANDPLANE": Airplane
                    "FIXED-WING SEAPLANE": Airplane
                    "FIXED-WING AMPHIBIAN": Airplane
                    "ROTORCRAFT": Helicopter
                    "GLIDER": Glider
                    "POWERED GLIDER": Glider
                    "MOTOR GLIDER": Glider
                    "FREE BALLOON": Balloon
                    "AIRSHIP": Airship
                    "MICROLIGHT AEROPLANE": Microlight
                    "GYROPLANE": Gyroplane
                    "POWERED LIFT": "Powered Lift"
                    "TILT ROTOR": "Powered Lift"
              - source: ch-bazl
                endpoint: bulk
                field: " Aircraft Type"
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Aeroplane": Airplane
                    "Homebuilt Airplane": Airplane
                    "Helicopter": Helicopter
                    "Homebuilt Helicopter": Helicopter
                    "Glider": Glider
                    "Powered Glider": Glider
                    "Homebuild Glider": Glider
                    "Balloon (Hot-air)": Balloon
                    "Balloon (Gas)": Balloon
                    "Airship (Hot-air)": Airship
                    "Ultralight Gyrocopter": Gyroplane
                    "Homebuilt Gyrocopter": Gyroplane
                    "Ultralight (3-axis control)": Microlight
                    "Ecolight": Microlight
                    "Trike": Weight-Shift-Control
              - source: at-austrocontrol
                endpoint: bulk
                field: luftfahrzeugart
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; unknown values pass through unmodified"
                  values:
                    "Flugzeug": Airplane
                    "Hubschrauber": Helicopter
                    "Tragschrauber": Gyroplane
                    "Eigenstartfähiger Motorsegler": Glider
                    "Nicht eigenstartfähiger Motorsegler": Glider

          model:
            type: string
            description: "Model designation from the national registry (e.g. 757-232)"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: MODEL
                position: 2
              - source: ca-tc
                file: carscurr.txt
                field: MODEL_NAME
                position: 4
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Model
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Type
              - source: au-casa
                file: acrftreg
                field: Model
                notes: "Type column is always blank; Model column used instead"
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Model
              - source: fr-dgac
                file: export.csv
                field: MODELE
              - source: bs-caa
                file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
                field: "AIRCRAFT TYPE - MAKE/MODEL"
                description: "Combined make and model free-text field (e.g. 'B737-790', 'CIRRUS SR 22', 'DE HAVILLAND DHC-6'); no separate manufacturer column; stored as-is"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Series Type"
                description: "Combined manufacturer and model free-text field (e.g. 'Gulfstream Aerospace Corporation G-IV', 'Leonardo S.p.A. AW139'); no separate manufacturer column; embedded newlines normalised to spaces; stored as-is"
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.Type
              - source: ch-bazl
                endpoint: bulk
                field: " Aicraft Model"
                description: "Model designation as published (note: 'Aicraft' is a typo in the source field name)"
              - source: at-austrocontrol
                endpoint: bulk
                field: baumuster

          seats:
            type: integer
            description: "Number of seats certified"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: NO-SEATS
                position: 8
              - source: ca-tc
                file: carscurr.txt
                field: NUMBER_OF_SEATS
                position: 18
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.MaximumPassengers
              - source: ch-bazl
                endpoint: bulk
                field: " MOPSC"
                description: "Maximum Operational Passenger Seating Configuration"

          category:
            type: string
            description: "Aircraft build category (Land, Sea, Amphibian)"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: CLASS
                position: 5
                transform:
                  type: decode_table
                  values:
                    "1": Land
                    "2": Sea
                    "3": Amphibian

          manufacturer:
            type: string
            description: "Aircraft manufacturer name"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: MFG
                position: 1
              - source: ca-tc
                file: carscurr.txt
                field: ID_PLATE_MANUFACTURERS_NAME
                position: 7
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Manufacturer
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Produsent
              - source: au-casa
                file: acrftreg
                field: Manu
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Manufacturer
              - source: fr-dgac
                file: export.csv
                field: CONSTRUCTEUR
              - source: mictronics
                file: types.json
                field: "values[0]"
                transform:
                  type: split_first
                  delimiter: " "
                  description: "Split 'Boeing 737-800' on first space; keep left part"
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.Manufacturer
              - source: ch-bazl
                endpoint: bulk
                field: " Manufacturer"
              - source: at-austrocontrol
                endpoint: bulk
                field: hersteller

          type_designator:
            type: string
            description: "ICAO 4-character aircraft type designator (e.g. B752)"
            persisted: true
            sources:
              - source: mictronics
                file: aircrafts.json
                field: "values[1]"
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: ICAO-code
                description: "ICAO 4-character type designator (e.g. B738, TL30)"
              - source: au-casa
                file: acrftreg
                field: ICAOtypedesig
                description: "ICAO 4-character type designator; populated for all CASA records"
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.ICAOAircraftTypeDesignator
              - source: ch-bazl
                endpoint: bulk
                field: " ICAO Aircraft Type"

          manufacturer_model:
            type: string
            description: "Combined manufacturer + model string from Mictronics types (e.g. BOEING 757-200)"
            persisted: true
            sources:
              - source: mictronics
                file: types.json
                field: "values[0]"

          serial_number:
            type: string
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: SERIAL NUMBER
                position: 1
              - source: ca-tc
                file: carscurr.txt
                field: MANUFACTURERS_SERIAL_NUMBER
                position: 5
              - source: nz-caa
                file: Aircraft-Register-for-website-.csv
                field: Serial No.
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Serienummer
              - source: au-casa
                file: acrftreg
                field: Serial
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Serial
              - source: fr-dgac
                file: export.csv
                field: NUMERO_SERIE
              - source: bs-caa
                file: "Updated-THE-BAHAMAS-CIVIL-AIRCRAFT-REGISTER-{Month}-{DD}-{YYYY}.pdf"
                field: "SERIAL #"
              - source: ky-caa
                file: Active-Aircraft-Register.pdf
                field: "Serial Number"
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.SerialNumber
              - source: ch-bazl
                endpoint: bulk
                field: " Serial Number"
              - source: at-austrocontrol
                endpoint: bulk
                field: seriennummer

          manufactured_date:
            type: datetime
            description: "Date of manufacture as ISO 8601 UTC datetime; FAA is year-only precision (January 1 assumed); TC is nominally full date but 99.8% of records are also January 1"
            persisted: true
            sources:
              - source: us-faa
                file: master.txt
                field: YEAR MFR
                position: 4
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "FAA provides 4-digit year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: ca-tc
                file: carscurr.txt
                field: DATE_MANUFACTURE_ASSEMBLY
                position: 31
                precision: date
                transform:
                  type: format_string
                  pattern: "{value.replace('/', '-')}T00:00:00Z"
                  description: "TC provides YYYY/MM/DD — reformat separators and append UTC time"
                  skip_if_empty: true
              - source: no-caa
                file: norgesluftfartoyregister.json
                field: Byggeår
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "Norway provides 4-digit build year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Built
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "ILT provides 4-digit build year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: au-casa
                file: acrftreg
                field: Yearmanu
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "CASA provides 4-digit manufacture year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: uk-caa
                endpoint: details
                field: AircraftDetails.YearBuild
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "UK CAA provides 4-digit build year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true
              - source: ch-bazl
                endpoint: bulk
                field: " Year of Manufacture"
                precision: year
                transform:
                  type: format_string
                  pattern: "{value}-01-01T00:00:00Z"
                  description: "BAZL provides 4-digit manufacture year only — January 1 at midnight UTC assumed"
                  skip_if_empty: true

          wake_turbulence_category:
            type: string
            description: "ICAO wake turbulence category (Light, Medium, Heavy, Super)"
            persisted: true
            sources:
              - source: mictronics
                file: types.json
                field: "values[2]"
                transform:
                  type: decode_table
                  values:
                    "J": Super
                    "H": Heavy
                    "M": Medium
                    "L": Light
                    "M/L": "Medium/Light"
                    "-": "Unknown/None"

      powerplant:
        type: object
        description: "Engine and powerplant specification data"
        persisted: true
        properties:

          count:
            type: integer
            description: "Number of engines installed"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: NO-ENG
                position: 7
              - source: ca-tc
                file: carscurr.txt
                field: NUMBER_OF_ENGINES
                position: 17
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: Engines
              - source: au-casa
                file: acrftreg
                field: engnum
              - source: uk-caa
                endpoint: details
                field: "AircraftDetails.Engines[0].TotalNumberOfEngines"

          type:
            type: string
            description: "Engine type (Reciprocating, Turbo-fan, etc.)"
            persisted: true
            sources:
              - source: us-faa
                file: acftref.txt
                field: TYPE-ENG
                position: 4
                transform:
                  type: decode_table
                  values:
                    "0": None
                    "1": Piston
                    "2": Turbo-prop
                    "3": Turbo-shaft
                    "4": Turbo-jet
                    "5": Turbo-fan
                    "6": Ramjet
                    "7": 2 Cycle
                    "8": 4 Cycle
                    "9": Unknown
                    "10": Electric
                    "11": Rotary
              - source: ca-tc
                file: carscurr.txt
                field: ENGINE_CATEGORY_E
                position: 15
                transform:
                  type: decode_table
                  values:
                    "Piston": Piston
                    "Turbo Fan": Turbo-fan
                    "Turbo Prop": Turbo-prop
                    "Turbo Shaft": Turbo-shaft
                    "Turbo Jet": Turbo-jet
                    "Electric": Electric
                    "Other": Unknown
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: EngKind
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; 'Engine - not defined' and blank → omit; unknown values pass through unmodified"
                  values:
                    "Reciprocating piston-driven engine": Piston
                    "Reciprocating piston radial engine": Piston
                    "Piston-driven shaft (rotorcraft) engine": Piston
                    "Reciprocating piston-driven Diesel engine": Diesel
                    "Electrical engine": Electric
                    "Turbofan engine": Turbo-fan
                    "Turbine-driven shaft (rotorcraft) engine": Turbo-shaft
                    "Turbine-driven propeller engine": Turbo-prop
                    "Turbojet engine": Turbo-jet
                    "Wankel engine": Rotary
                    "Engine - not defined": ~~omit~~
              - source: au-casa
                file: acrftreg
                field: Engtype
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; 'Not Applicable' → omit; unknown values pass through unmodified"
                  values:
                    "Piston": Piston
                    "Turbofan": Turbo-fan
                    "Turboprop": Turbo-prop
                    "Turboshaft": Turbo-shaft
                    "Turbojet": Turbo-jet
                    "Electric": Electric
                    "Diesel Engine": Diesel
                    "Rotary": Rotary
                    "Not Applicable": ~~omit~~
              - source: ch-bazl
                endpoint: bulk
                field: " Engine Category"
                transform:
                  type: decode_table_passthrough
                  description: "Mapped to canonical type; comma-separated multi-engine entries take first value; unknown values pass through unmodified"
                  values:
                    "Piston Engine": Piston
                    "Turboshaft Engine": Turbo-shaft
                    "Turboprop Engine": Turbo-prop
                    "Jet Engine": Turbo-jet
                    "Electrical Engine": Electric
                    "Hydrogen-Electric": Hydrogen-Electric

          model:
            type: string
            description: "Engine model designation (e.g. LEAP-1B28)"
            persisted: true
            sources:
              - source: us-faa
                file: engine.txt
                field: MODEL
                position: 2
                join: "master.txt[3] → engine.txt[0]"
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: EngModel
                notes: "Values containing 'not further defined' are omitted"
              - source: au-casa
                file: acrftreg
                field: Engmodel
              - source: uk-caa
                endpoint: details
                field: "AircraftDetails.Engines[0].Name"
              - source: ch-bazl
                endpoint: bulk
                field: " Engine"
                transform:
                  type: split_first
                  delimiter: ", "
                  description: "Comma-separated multi-engine entries take first value (e.g. 'CFM56-5B4/3, CFM56-5B4/P' → 'CFM56-5B4/3')"

          manufacturer:
            type: string
            description: "Engine manufacturer name"
            persisted: true
            sources:
              - source: us-faa
                file: engine.txt
                field: MFR
                position: 1
                join: "master.txt[3] → engine.txt[0]"
              - source: ca-tc
                file: carscurr.txt
                field: ENGINE_MANUF_E
                position: 13
              - source: nl-ilt
                file: luchtvaartuigregister-ilt-datas2-{YYYY-MM-DD}.ods
                field: EngManufacturer
                notes: "Values of 'Unknown' are omitted"
              - source: au-casa
                file: acrftreg
                field: Engmanu

          power_type:
            type: string
            description: "Power rating unit — Horsepower (piston/turbo-prop) or Thrust (jet)"
            persisted: true
            sources:
              - source: us-faa
                file: engine.txt
                description: "Derived from engine TYPE; piston/prop → Horsepower; jet → Thrust"

          power_value:
            type: integer
            description: "Rated power output in horsepower or pounds of thrust"
            persisted: true
            sources:
              - source: us-faa
                file: engine.txt
                description: "HORSEPOWER or THRUST column depending on engine type"

      military:
        type: boolean
        description: "True if the aircraft is known to be military"
        persisted: true
        sources:
          - source: mictronics
            file: aircrafts.json
            field: "values[2]"
            transform:
              type: string_index_equals
              index: 0
              equals: "1"
              description: "flags_string[0] == '1'"

      ident:
        type: string
        description: "Callsign/flight number broadcast by the aircraft (e.g. DAL2)"
        persisted: true
        sources:
          - source: processor
            description: "DF 17 TC 1-4 ident message"

      operator:
        type: object
        description: "Airline operator enrichment from Mictronics; keyed by airline_designator"
        persisted: true
        properties:
          airline_designator:
            type: string
            description: "3-character ICAO airline code (e.g. DAL)"
            sources:
              - source: mictronics
                file: operators.json
                field: "key (airline_designator)"
          name:
            type: string
            description: "Full airline name (e.g. Delta Air Lines)"
            sources:
              - source: mictronics
                file: operators.json
                field: "values[0]"
          country:
            type: string
            sources:
              - source: mictronics
                file: operators.json
                field: "values[1]"
          callsign:
            type: string
            description: "RTF callsign (e.g. DELTA)"
            sources:
              - source: mictronics
                file: operators.json
                field: "values[2]"

      squawk:
        type: string
        description: "4-digit Mode A transponder squawk code (e.g. 7314)"
        persisted: true
        sources:
          - source: processor
            description: "DF 5/21 squawk message"

      origin:
        type: object
        description: "Departure airport enrichment; full object during processing; ICAO code string on persist"
        persisted: true
        persist_as:
          type: string
          from_field: icao_code
          description: "Only the ICAO code string (e.g. 'KMLB') is written to the S3 record"
        properties:
          icao_code:
            type: string
            description: "ICAO 4-character airport code"
            sources:
              - source: flightaware
              - source: standing-data
                file: routes
          iata_code:
            type: string
            description: "IATA 3-character airport code"
            sources:
              - source: ourairports
                file: airports.csv
                field: iata_code
          name:
            type: string
            sources:
              - source: ourairports
                file: airports.csv
                field: name
          city:
            type: string
            sources:
              - source: ourairports
                file: airports.csv
                field: municipality
          administrative_area:
            type: string
            description: "ISO 3166-2 subdivision code (e.g. US-FL)"
            sources:
              - source: ourairports
                file: airports.csv
                field: iso_region
          country:
            type: string
            description: "ISO 3166-1 alpha-2 country code"
            sources:
              - source: ourairports
                file: airports.csv
                field: iso_country
          phonic:
            type: string
            description: "Spoken/phonetic airport name for TTS notifications"
            sources:
              - source: ourairports
                file: airports.csv
                description: "Computed algorithmically from name + municipality; overridable via phonic_overrides.json"

      destination:
        type: object
        description: "Arrival airport enrichment; full object during processing; ICAO code string on persist"
        persisted: true
        persist_as:
          type: string
          from_field: icao_code
          description: "Only the ICAO code string (e.g. 'KATL') is written to the S3 record"
        properties:
          icao_code:
            type: string
            description: "ICAO 4-character airport code"
            sources:
              - source: flightaware
              - source: standing-data
                file: routes
          iata_code:
            type: string
            description: "IATA 3-character airport code"
            sources:
              - source: ourairports
                file: airports.csv
                field: iata_code
          name:
            type: string
            sources:
              - source: ourairports
                file: airports.csv
                field: name
          city:
            type: string
            sources:
              - source: ourairports
                file: airports.csv
                field: municipality
          administrative_area:
            type: string
            description: "ISO 3166-2 subdivision code (e.g. US-GA)"
            sources:
              - source: ourairports
                file: airports.csv
                field: iso_region
          country:
            type: string
            description: "ISO 3166-1 alpha-2 country code"
            sources:
              - source: ourairports
                file: airports.csv
                field: iso_country
          phonic:
            type: string
            description: "Spoken/phonetic airport name for TTS notifications"
            sources:
              - source: ourairports
                file: airports.csv
                description: "Computed algorithmically from name + municipality; overridable via phonic_overrides.json"

      matched_rules:
        type: "array[string]"
        description: "Rule name identifiers that fired for this flight"
        persisted: true
        sources:
          - source: processor

      positions:
        type: "array[object]"
        description: "Time-ordered position reports"
        persisted: true
        properties:
          timestamp:
            type: datetime
            description: "UTC timestamp of the position report"
            sources:
              - source: processor
          latitude:
            type: float
            sources:
              - source: processor
          longitude:
            type: float
            sources:
              - source: processor
          altitude:
            type: integer
            description: "Altitude in feet MSL; null if not present in the ADS-B message"
            sources:
              - source: processor

      velocities:
        type: "array[object]"
        description: "Time-ordered velocity reports"
        persisted: true
        properties:
          timestamp:
            type: datetime
            description: "UTC timestamp of the velocity report"
            sources:
              - source: processor
          velocity:
            type: float
            description: "Ground speed in knots"
            sources:
              - source: processor
          heading:
            type: float
            description: "True heading in degrees (0–359)"
            sources:
              - source: processor
          vertical_speed:
            type: integer
            description: "Vertical speed in feet per minute; negative = descending"
            sources:
              - source: processor

      foreign_key:
        type: integer
        description: "G-INFO AircraftID cached by the UK CAA runner; enables fast-path enrichment on subsequent runs by skipping the POST /api/aircraft/search call. Verified each run against the returned Mark field; cleared on mismatch or HTTP error."
        persisted: false
        sources:
          - source: uk-caa
            endpoint: details
            field: AircraftID
            description: "Written alongside every successful enrichment; on subsequent runs used directly as the details lookup key. Deleted from the Redis record if the mark no longer matches (aircraft re-registered) or if a 4xx HTTP error is returned."