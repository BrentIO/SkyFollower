      special_livery:
        type: boolean
        description: "True if the aircraft is currently wearing a known special/retro/sponsor livery"
        persisted: true
        sources:
          - source: airportwebcams
            transform:
              type: constant
              value: true
              description: "Set for every icao_hex the runner successfully resolves a Registration match for. Absent (not explicitly false) for every other aircraft — this source only ever writes positive matches, so downstream consumers must treat a missing key as false, the same way most other Optional aircraft fields already work"

      livery_name:
        type: string
        description: "Human-readable special livery name, cleaned for a Home Assistant TTS announcement on a matched-flight notification"
        persisted: true
        sources:
          - source: airportwebcams
            field: Description
            transform:
              type: strip_annotations_then_split_last_segment
              description: "1) Strip any parenthetical group whose contents contain 'sticker' or '#new' case-insensitively (covers '(sticker)', '(stickers)', '(sticker, underside)', '(sticker; underside/belly)', and the site's '(#New at DD-Mon-YY)' freshness marker in whatever exact wording/date format it uses) — this runs BEFORE the split below, not after, because at least one real annotation contains its own '/' ('(sticker; underside/belly)'), which would otherwise be misread as an extra compound-description segment. 2) Split what remains on '/' and take the LAST segment — for the ~7% of rows with a compound description, the last-listed livery is treated as the current/primary one. 3) Collapse whitespace and trim. Other parenthetical content that is genuinely part of the name (e.g. a year like '(2022)') is left untouched. Verified against all 2,074 rows in the live table: the transform never produces an empty result. Examples: 'Rugby's Greatest Rivalry / 2026 NZ v SA rugby tour (#New at 17-Jul-26)' -> '2026 NZ v SA rugby tour'; '50th Anniversary / Air Silk Road / 1 Million Tons, 10 Years (stickers)' -> '1 Million Tons, 10 Years'; 'Amar Bank (sticker) (#New at 17-Jul-26)' -> 'Amar Bank'; 'FedEx founder F W Smith (sticker; underside/belly)' -> 'FedEx founder F W Smith'"

